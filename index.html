<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CATTI 备考教练</title>
<style>
  :root{
    --paper:#F7F6F2;
    --card:#FFFFFF;
    --ink:#1E2C46;
    --ink-soft:#40567E;
    --ink-faint:#8A93A6;
    --red:#BE3B2E;
    --red-soft:#F6E9E7;
    --rule:#DDD9CF;
    --blue-soft:#EDF0F6;
    --radius:10px;
    --shadow:0 1px 3px rgba(30,44,70,.08);
    --serif:"Noto Serif SC","Songti SC","SimSun",serif;
    --sans:-apple-system,BlinkMacSystemFont,"PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;
    --mono:"SFMono-Regular",Consolas,"Courier New",monospace;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--paper);color:var(--ink);font-family:var(--sans);font-size:15px;line-height:1.7;}
  button{font-family:var(--sans);cursor:pointer;}
  button:focus-visible,input:focus-visible,textarea:focus-visible,select:focus-visible{outline:2px solid var(--red);outline-offset:2px;}
  @media (prefers-reduced-motion: reduce){*{animation:none!important;transition:none!important;}}

  .wrap{max-width:760px;margin:0 auto;padding:0 16px 80px;}

  /* ── header ── */
  header{display:flex;align-items:center;justify-content:space-between;padding:20px 0 14px;border-bottom:2px solid var(--ink);}
  .brand{font-family:var(--serif);font-size:21px;font-weight:700;letter-spacing:.08em;}
  .brand small{display:block;font-family:var(--sans);font-size:11px;font-weight:400;color:var(--ink-faint);letter-spacing:.25em;margin-top:2px;}
  .dstamp{border:2.5px solid var(--red);color:var(--red);border-radius:50%;width:64px;height:64px;display:flex;flex-direction:column;align-items:center;justify-content:center;transform:rotate(6deg);font-weight:700;flex-shrink:0;}
  .dstamp b{font-family:var(--mono);font-size:17px;line-height:1.1;}
  .dstamp span{font-size:10px;letter-spacing:.1em;}

  nav{display:flex;gap:4px;margin:14px 0 20px;border-bottom:1px solid var(--rule);}
  nav button{background:none;border:none;padding:8px 14px;font-size:14px;color:var(--ink-soft);border-bottom:2px solid transparent;margin-bottom:-1px;}
  nav button.on{color:var(--ink);border-bottom-color:var(--red);font-weight:600;}

  /* ── onboarding ── */
  .ob{max-width:560px;margin:40px auto;}
  .ob h1{font-family:var(--serif);font-size:26px;margin-bottom:6px;}
  .ob .sub{color:var(--ink-soft);margin-bottom:26px;}
  .obstep{background:var(--card);border:1px solid var(--rule);border-radius:var(--radius);box-shadow:var(--shadow);padding:22px;margin-bottom:16px;}
  .obstep h3{font-size:15px;margin-bottom:12px;}
  .obstep h3 em{font-style:normal;color:var(--red);font-family:var(--mono);margin-right:8px;font-size:13px;}
  .optrow{display:flex;flex-wrap:wrap;gap:8px;}
  .opt{border:1px solid var(--rule);background:var(--paper);border-radius:8px;padding:8px 16px;font-size:14px;color:var(--ink);}
  .opt.sel{background:var(--ink);color:#fff;border-color:var(--ink);}
  .obstep input[type=date]{border:1px solid var(--rule);border-radius:8px;padding:8px 12px;font-size:14px;font-family:var(--sans);background:var(--paper);color:var(--ink);}
  .hintline{font-size:12.5px;color:var(--ink-faint);margin-top:8px;}
  .cta{display:block;width:100%;background:var(--red);color:#fff;border:none;border-radius:8px;padding:13px;font-size:16px;font-weight:600;letter-spacing:.1em;}
  .cta:disabled{background:var(--ink-faint);}

  /* ── today ── */
  .daybar{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:6px;}
  .daybar h2{font-family:var(--serif);font-size:20px;}
  .daybar .meta{font-size:13px;color:var(--ink-soft);}
  .dnav{display:flex;align-items:center;gap:10px;}
  .btn.nav{padding:2px 11px;font-size:16px;line-height:1.4;border-radius:6px;}
  .doneban{border-color:var(--ink);border-width:1.5px;}
  .dcell{cursor:pointer;transition:border-color .15s;}
  .dcell:hover{border-color:var(--ink);}
  .pbar{height:5px;background:var(--rule);border-radius:3px;margin-bottom:22px;overflow:hidden;}
  .pbar i{display:block;height:100%;background:var(--ink);border-radius:3px;transition:width .3s;}

  .slot{position:relative;padding-left:34px;margin-bottom:8px;}
  .slot::before{content:"";position:absolute;left:11px;top:8px;bottom:-8px;width:1px;background:var(--rule);}
  .slot:last-of-type::before{bottom:auto;height:20px;}
  .slotlabel{position:absolute;left:0;top:2px;width:23px;height:23px;border:1.5px solid var(--ink);border-radius:50%;background:var(--paper);color:var(--ink);font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;}

  .card{position:relative;background:var(--card);border:1px solid var(--rule);border-radius:var(--radius);box-shadow:var(--shadow);padding:18px 18px 16px;margin-bottom:14px;}
  .card.done{opacity:.75;}
  .chead{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:8px;}
  .chead h4{font-family:var(--serif);font-size:16.5px;}
  .cmeta{display:flex;align-items:center;gap:8px;flex-shrink:0;}
  .chead .mins{font-family:var(--mono);font-size:12px;color:var(--ink-soft);white-space:nowrap;border:1px solid var(--rule);border-radius:4px;padding:1px 7px;}
  .fbbtn{border:1px solid var(--red);background:var(--red-soft);color:var(--red);border-radius:6px;height:22px;font-size:12px;line-height:1;padding:0 9px;font-weight:600;white-space:nowrap;}
  .fbbtn.has{background:var(--red);color:#fff;}
  .fbpanel{border:1px dashed var(--red);border-radius:8px;padding:12px;margin:10px 0;background:var(--red-soft);}
  .fblabel{display:block;font-size:12px;font-weight:600;color:var(--red);margin-bottom:3px;}
  .fbin{width:100%;min-height:52px;border:1px solid var(--rule);border-radius:6px;padding:8px 10px;font-family:var(--sans);font-size:13.5px;background:#fff;color:var(--ink);resize:vertical;margin-bottom:8px;}
  .cbody{font-size:14.5px;color:var(--ink);}
  .cbody .note{color:var(--ink-soft);font-size:13.5px;}

  .stamp{position:absolute;top:-10px;right:-8px;border:2.5px solid var(--red);color:var(--red);border-radius:50%;width:58px;height:58px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;transform:rotate(-14deg);background:rgba(255,255,255,.85);letter-spacing:.15em;pointer-events:none;}

  table.words{width:100%;border-collapse:collapse;font-size:13.5px;margin:8px 0;}
  table.words th{font-weight:600;text-align:left;color:var(--ink-soft);border-bottom:1px solid var(--ink);padding:4px 6px;font-size:12.5px;}
  table.words td{border-bottom:1px solid var(--rule);padding:5px 6px;vertical-align:top;}
  table.words td.en{font-family:var(--mono);font-size:12.5px;}
  table.words td.hint{color:var(--ink-faint);font-size:12px;}

  .srcbox{white-space:pre-line;background:var(--blue-soft);border-left:3px solid var(--ink);border-radius:0 8px 8px 0;padding:12px 14px;margin:10px 0;font-size:14.5px;}
  .parallel{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:8px 0;}
  .parallel .psrc{white-space:pre-line;background:var(--blue-soft);border-left:3px solid var(--ink);border-radius:0 8px 8px 0;padding:12px 14px;font-size:14px;}
  .parallel .pref{white-space:pre-line;background:var(--red-soft);border-left:3px solid var(--red);border-radius:0 8px 8px 0;padding:12px 14px;font-size:13.5px;}
  .hlmark{background:#FFE58A;border-radius:2px;padding:0 1px;}
  @media (max-width:520px){.parallel{grid-template-columns:1fr;}}
  .refbox{white-space:pre-line;background:var(--red-soft);border-left:3px solid var(--red);border-radius:0 8px 8px 0;padding:12px 14px;margin:10px 0;font-size:14px;}
  .refbox .rlabel{color:var(--red);font-weight:700;font-size:12px;letter-spacing:.15em;margin-bottom:4px;}

  details{margin:8px 0;}
  details summary{cursor:pointer;color:var(--ink-soft);font-size:13.5px;user-select:none;}
  details[open] summary{margin-bottom:4px;}

  .checks{list-style:none;margin:6px 0;}
  .checks li{padding:4px 0;font-size:13.5px;display:flex;gap:8px;align-items:flex-start;}
  .checks input{margin-top:5px;accent-color:var(--red);}

  textarea.mywork{width:100%;min-height:130px;border:1px solid var(--rule);border-radius:8px;padding:10px 12px;font-family:var(--sans);font-size:14px;background:var(--paper);color:var(--ink);resize:vertical;margin:8px 0;}

  .btnrow{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px;}
  .btn{border:1px solid var(--ink);background:var(--card);color:var(--ink);border-radius:7px;padding:7px 14px;font-size:13.5px;}
  .btn.primary{background:var(--ink);color:#fff;}
  .btn.red{border-color:var(--red);color:var(--red);}
  .btn.red.timing{background:var(--red);color:#fff;}
  .btn:disabled{opacity:.45;cursor:default;}
  .timerbig{font-family:var(--mono);font-size:15px;}

  .phrase{display:inline-block;background:var(--paper);border:1px solid var(--rule);border-radius:5px;padding:2px 8px;margin:3px 4px 3px 0;font-size:12.5px;font-family:var(--mono);}
  .phrase i{font-style:normal;font-family:var(--sans);color:var(--ink-faint);margin-left:6px;font-size:12px;}
  .framebox{border:1px solid var(--rule);border-left:3px solid var(--ink);border-radius:0 8px 8px 0;padding:10px 12px;margin:8px 0;background:var(--card);}
  .funcbadge{display:inline-block;background:var(--ink);color:#fff;font-size:11px;border-radius:4px;padding:1px 8px;letter-spacing:.05em;margin-bottom:5px;}
  .fpattern{font-family:var(--mono);font-size:13px;line-height:1.6;}
  .fpattern b.slot{color:var(--red);font-weight:600;}

  .levelnote{background:var(--red-soft);border:1px dashed var(--red);border-radius:8px;padding:10px 14px;font-size:13px;color:var(--ink);margin-bottom:18px;}
  .levelnote b{color:var(--red);}

  /* ── plan overview ── */
  .phase{margin-bottom:20px;}
  .phase h3{font-family:var(--serif);font-size:16px;border-bottom:1px solid var(--ink);padding-bottom:4px;margin-bottom:8px;}
  .phase h3 span{font-family:var(--sans);font-weight:400;font-size:12.5px;color:var(--ink-soft);margin-left:8px;}
  .dgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(86px,1fr));gap:6px;}
  .dcell{border:1px solid var(--rule);border-radius:7px;padding:6px 8px;font-size:12px;background:var(--card);color:var(--ink-soft);}
  .dcell b{display:block;color:var(--ink);font-family:var(--mono);font-size:12px;}
  .dcell.today{border-color:var(--red);box-shadow:0 0 0 1px var(--red);}
  .dcell.past{opacity:.5;}
  .dcell.stub{background:var(--paper);border-style:dashed;}

  /* ── review / settings ── */
  .panel{background:var(--card);border:1px solid var(--rule);border-radius:var(--radius);box-shadow:var(--shadow);padding:20px;margin-bottom:16px;}
  .panel h3{font-family:var(--serif);font-size:16.5px;margin-bottom:10px;}
  .panel p{font-size:14px;color:var(--ink);margin-bottom:8px;}
  .panel .small{font-size:12.5px;color:var(--ink-faint);}
  .synccode{width:100%;font-family:var(--mono);font-size:12px;border:1px solid var(--rule);border-radius:8px;padding:10px;background:var(--paper);min-height:70px;color:var(--ink);}

  .toast{position:fixed;left:50%;bottom:28px;transform:translateX(-50%);background:var(--ink);color:#fff;padding:9px 18px;border-radius:8px;font-size:13.5px;box-shadow:0 4px 14px rgba(30,44,70,.3);opacity:0;pointer-events:none;transition:opacity .25s;z-index:50;}
  .qrpanel{text-align:center;}
  .qrimg{display:block;width:min(240px,70%);margin:10px auto 6px;border-radius:10px;}
  .paywall{border:1.5px solid var(--red);}
  .paywall h3{color:var(--red);}
  .paykey{display:flex;gap:8px;margin:12px 0 6px;flex-wrap:wrap;}
  .paykey input{flex:1;min-width:160px;border:1px solid var(--rule);border-radius:8px;padding:9px 12px;font-size:14px;background:var(--paper);color:var(--ink);}
  .toast.show{opacity:1;}

  @media (max-width:520px){
    .dstamp{width:56px;height:56px;}
    .card{padding:14px;}
    table.words td.hint{display:none;}
    table.words th:nth-child(3){display:none;}
  }
</style>
</head>
<body>
<div class="wrap" id="app"></div>
<div class="toast" id="toast"></div>

<script>
/* =====================================================================
   CATTI 备考教练 · 原型 v0.1
   架构：诊断问卷 → 规则引擎生成计划 → 每日任务 → 周复盘 → 动态调整
   数据：全部存 localStorage（键前缀 coach_），与背词页同域即可互通
   ===================================================================== */

/* ── 卡密（可选）───────────────────────────────────────────
   把售出卡密的 SHA-256 值放进 ACCESS_KEYS 数组即可启用验证；
   数组为空 = 演示模式，直接进入。
   生成 SHA-256：浏览器控制台运行
   crypto.subtle.digest('SHA-256', new TextEncoder().encode('你的卡密'))
------------------------------------------------------------ */
const ACCESS_KEYS = [];

/* ── 免费试用设置 ──
   前 TRIAL_DAYS 个自然日免费，之后需正式卡密解锁「当天及以后的新任务」。
   已看过的内容仍可回看；卡密只是解锁开关，不加密素材。
   PAY_INFO 是付费墙上给用户的文案/联系方式，按需修改。 ── */
const TRIAL_DAYS = 5;               // 前5天免费，第6天起弹付费墙
const PAY_INFO = {
  title: "试用已结束，解锁完整35天计划",
  lines: [
    "你已经免费跟练了一个入门阶段。接下来是强化实战、双向限时翻译、模考和阶段成长复盘——这些才是真正提分的部分。",
    "输入正式卡密即可解锁全部内容；卡密请通过下方方式向作者获取。"
  ],
  contact: "微信 / 公众号：Plan4Catti（把付款截图发给作者领取卡密）"
};

/* ── 内测开关：true = 阶段总结3次练习/3天即解锁（便于短周期内测体验该功能）
   正式上线前改回 false，恢复正常的30次/30天门槛。 ── */

 the economy. Solid headway was made in pursuing high-quality development and fostering new quality productive forces.", "breakdown": [["很不平凡", "truly remarkable", "四字格不要硬译，找一个精准形容词"], ["外部压力加大、内部困难增多", "mounting external pressures and growing domestic difficulties", "mounting/growing 两个动态形容词形成对仗"], ["复杂严峻形势", "complex and challenging developments", "\"形势\"译为 developments 比 situation 更正式"], ["砥砺奋进、攻坚克难", "overcome difficulties and continued to forge ahead", "两个四字格合并为一句，不要逐字翻"], ["总体平稳、稳中有进", "overall stable performance and steady growth", "压缩为一个名词短语"], ["扎实推进", "solid headway was made in...", "headway = 进展，被动句式"], ["稳步发展", "fostering...", "用动名词衔接"]], "collos": [{"en": "forge ahead", "zh": "砥砺奋进"}, {"en": "overcome difficulties", "zh": "攻坚克难"}, {"en": "mounting pressures", "zh": "不断加大的压力"}, {"en": "steady growth", "zh": "稳中有进"}], "frames": [{"func": "背景铺垫句", "pattern": "In the face of [挑战/形势], we [did sth]", "example": "In the face of complex and challenging developments, we continued to forge ahead.", "transfer": "In the face of mounting climate risks, we accelerated the green transition."}, {"func": "成就句 · 被动", "pattern": "Solid headway was made in [doing sth]", "example": "Solid headway was made in pursuing high-quality development.", "transfer": "Solid headway was made in expanding domestic demand."}, {"func": "特征描述", "pattern": "[situation] marked by [特征A] and [特征B]", "example": "developments marked by mounting external pressures and growing domestic difficulties", "transfer": "a recovery marked by weak demand and cautious investment"}]}, {"type": "practice", "slot": "pm", "dir": "c2e", "mins": 30, "title": "汉译英练习：政经总述", "src": "就业、物价总体平稳，城镇新增就业1256万人、城镇调查失业率平均为5.1%，居民消费价格上涨0.2%。国际收支基本平衡，对外贸易规模创历史新高，国际市场份额稳中有升，外汇储备超过3.2万亿美元。", "ref": "Employment and prices remained generally stable. A total of 12.56 million urban jobs were created, and surveyed urban unemployment rates averaged 5.1 percent. The consumer price index (CPI) increased by 0.2 percent. A basic equilibrium in the balance of payments was maintained. Foreign trade reached a record high, and the global market share of China's exports increased steadily. Foreign exchange reserves surpassed 3.2 trillion US dollars.", "checks": ["\"城镇新增就业\"有没有用 \"urban jobs were created\"？", "数字格式对不对？12.56 million，不是 1256 万", "\"创历史新高\"是不是用了 record high？", "\"稳中有升\"有没有体现 steadily？", "trillion 拼对了吗？"]}, {"type": "review", "slot": "pm", "mins": 30, "title": "滚动复习与术语本", "body": "Day 1 没有前几天的词要复习，这30分钟用来： 把今天精读段落中标注的搭配抄进术语本 把汉译英练习中自己写错的表达重新写一遍"}, {"type": "comprehensive", "slot": "pm", "mins": 60, "title": "综合能力刷题", "body": "做一套阅读理解（4篇），限时40分钟。剩余20分钟对答案、标记生词。"}]},
{"day": 2, "theme": "经济成就", "modules": [{"type": "vocab", "slot": "am", "mins": 30, "title": "背诵热词（15个）", "words": [{"zh": "全国统一大市场", "en": "unified national market", "hint": "unified 不是 united"}, {"zh": "公平竞争审查", "en": "fair competition review", "hint": "review 不是 examination"}, {"zh": "营商环境", "en": "business environment", "hint": "简洁即可"}, {"zh": "民营经济", "en": "private sector / private economy", "hint": "两种都可"}, {"zh": "国有企业改革", "en": "reform of state-owned enterprises (SOEs)", "hint": "注意缩写 SOEs"}, {"zh": "高水平对外开放", "en": "high-standard opening up", "hint": "standard 不是 level"}, {"zh": "跨境服务贸易负面清单", "en": "negative list for cross-border trade in services", "hint": "长词组，整体记"}, {"zh": "外资准入限制", "en": "market access restrictions on foreign investment", "hint": "注意 on 不是 of"}, {"zh": "共建\"一带一路\"", "en": "Belt and Road cooperation", "hint": "官方已简化，不加 Initiative 也行"}, {"zh": "单边开放", "en": "unilateral opening up", "hint": "unilateral 是关键词"}, {"zh": "双向投资合作", "en": "two-way investment cooperation", "hint": "two-way 不是 bilateral"}, {"zh": "自贸试验区", "en": "pilot free trade zones", "hint": "pilot = 试验"}, {"zh": "各类经营主体", "en": "all market entities", "hint": "entities 不是 subjects"}, {"zh": "激发市场活力", "en": "energize the market", "hint": "energize 是官方用词"}, {"zh": "深化改革", "en": "deepen reform", "hint": "基础搭配"}], "method": ""}, {"type": "reading", "slot": "am", "mins": 60, "title": "精读段落：经济成就", "src": "经济规模稳步扩大，国内生产总值达到134.9万亿元、增长5%，增速居世界主要经济体前列，对全球经济增长的贡献率保持在30%左右。就业、物价总体平稳，城镇新增就业1256万人、城镇调查失业率平均为5.1%，居民消费价格上涨0.2%。国际收支基本平衡，对外贸易规模创历史新高，国际市场份额稳中有升，外汇储备超过3.2万亿美元。", "ref": "China's gross domestic product (GDP) rose to 134.9 trillion yuan, a year-on-year increase of 5 percent. China ranks among the world's fastest-growing major economies, continuing to contribute about 30 percent to global economic growth.\nA total of 12.56 million urban jobs were created, and surveyed urban unemployment rates averaged 5.1 percent. The consumer price index (CPI) increased by 0.2 percent.\nForeign trade reached a record high, and the global market share of China's exports increased steadily. Foreign exchange reserves surpassed 3.2 trillion US dollars.", "breakdown": [["经济规模稳步扩大", "（省略，直接用数据说话）", "中文喜欢先概括再给数据，英文直接上数据"], ["达到134.9万亿元", "rose to 134.9 trillion yuan", "万亿 = trillion，rose to 表示\"达到\""], ["增长5%", "a year-on-year increase of 5 percent", "year-on-year 是常用修饰"], ["增速居前列", "ranks among the fastest-growing", "不说 \"the growth speed is in the front\""], ["贡献率保持在30%左右", "continuing to contribute about 30 percent to", "contribute to 固定搭配"], ["城镇新增就业1256万人", "A total of 12.56 million urban jobs were created", "注意单位转换：万→million"], ["调查失业率平均为5.1%", "averaged 5.1 percent", "averaged 一个词搞定\"平均为\""], ["创历史新高", "reached a record high", "record high 固定搭配"], ["稳中有升", "increased steadily", "不需要翻出\"稳\"和\"升\"两层意思"], ["超过3.2万亿美元", "surpassed 3.2 trillion US dollars", "surpassed 比 exceeded 更正式"]], "collos": [{"en": "reach a record high", "zh": "创历史新高"}, {"en": "increase steadily", "zh": "稳中有升"}, {"en": "surpass", "zh": "超过（正式）"}, {"en": "contribute to global growth", "zh": "对全球增长作出贡献"}], "frames": [{"func": "数据句", "pattern": "[指标] rose to [数值], a year-on-year increase of [X] percent", "example": "GDP rose to 134.9 trillion yuan, a year-on-year increase of 5 percent.", "transfer": "R&D spending rose to 3.6 trillion yuan, a year-on-year increase of 8 percent."}, {"func": "排位句", "pattern": "[主体] ranks among the world's [最高级] [类别]", "example": "China ranks among the world's fastest-growing major economies.", "transfer": "The city ranks among the country's most innovative tech hubs."}, {"func": "成就句 · 被动", "pattern": "A total of [数量] [对象] were [done]", "example": "A total of 12.56 million urban jobs were created.", "transfer": "A total of 3,000 aging residential compounds were renovated."}]}, {"type": "practice", "slot": "pm", "dir": "c2e", "mins": 30, "title": "汉译英练习：经济成就", "src": "民生保障扎实稳固，居民人均可支配收入实际增长5.1%，脱贫攻坚成果持续巩固拓展，义务教育、基本养老、基本医疗、社会救助等保障力度加大。重点领域风险化解有序有效，社会大局保持稳定。", "ref": "Steady progress was made in ensuring the people's wellbeing. Per capita disposable income grew by 5.1 percent in real terms. Achievements made in poverty alleviation were further consolidated and expanded, and greater support was provided for compulsory education, basic old-age insurance, basic medical insurance, and social assistance. Well-ordered and effective steps were taken to defuse risks in key areas, helping ensure overall social stability.", "checks": ["\"实际增长\"翻成 in real terms 了吗？（不是 actually）", "\"脱贫攻坚成果\"用了 achievements in poverty alleviation？", "\"巩固拓展\"是 consolidated and expanded？", "\"保障力度加大\"是 greater support was provided for？", "\"有序有效\"是 well-ordered and effective？"]}, {"type": "review", "slot": "pm", "mins": 30, "title": "滚动复习与术语本", "body": "用10分钟快速过 Day 1 的15个词（遮住英文，看中文说英文）。重点检查： appropriately accommodative monetary policy（最长最难拼的） a basic equilibrium in the balance of payments（最容易忘的） counter-cyclical adjustments（拼写） 剩余20分钟把今天精读和练习中的错误表达整理进术语本。"}, {"type": "comprehensive", "slot": "pm", "mins": 60, "title": "综合能力刷题", "body": "做一套完形填空 + 词汇选择题，限时40分钟。剩余20分钟对答案。"}]},
{"day": 3, "theme": "改革开放", "modules": [{"type": "vocab", "slot": "am", "mins": 30, "title": "背诵热词（15个）", "words": [{"zh": "创新驱动发展", "en": "innovation-driven development", "hint": "driven 是核心词"}, {"zh": "科技自立自强", "en": "self-reliance and strength in science and technology", "hint": "两个名词并列"}, {"zh": "关键核心技术攻关", "en": "breakthroughs in core technologies in key fields", "hint": "攻关=breakthroughs"}, {"zh": "原始创新", "en": "original innovation", "hint": "不是 primitive"}, {"zh": "科技创新和产业创新深度融合", "en": "full integration between technological and industrial innovation", "hint": "between...and..."}, {"zh": "人工智能", "en": "artificial intelligence (AI)", "hint": ""}, {"zh": "集成电路", "en": "integrated circuits", "hint": "不是 chips"}, {"zh": "量子科技", "en": "quantum technology", "hint": ""}, {"zh": "数字经济", "en": "digital economy", "hint": ""}, {"zh": "数字中国建设", "en": "Digital China Initiative", "hint": "Initiative 大写"}, {"zh": "新兴产业", "en": "emerging industries", "hint": "emerging 不是 new"}, {"zh": "未来产业", "en": "industries of the future", "hint": "of the future 后置"}, {"zh": "先进制造业集群", "en": "advanced manufacturing clusters", "hint": "clusters=集群"}, {"zh": "产业升级", "en": "industrial upgrading", "hint": "upgrading 名词形式"}, {"zh": "拔尖创新人才", "en": "first-class innovators", "hint": "不是 top talents"}], "method": ""}, {"type": "reading", "slot": "am", "mins": 60, "title": "精读段落：改革开放", "src": "清理废除妨碍全国统一市场的规定做法，制定实施公平竞争审查条例，出台规范地方招商引资的措施。深化国有企业改革，持续优化国有经济布局。提请全国人大常委会审议民营经济促进法草案，改善民营经济发展环境。", "ref": "We overhauled and abolished regulations and practices impeding the development of a unified national market, formulated and implemented regulations on fair competition review, and adopted measures to regulate steps taken by local governments to attract investment. We further reformed state-owned enterprises (SOEs) and continued to improve the layout of the state-owned sector. We submitted a draft of the private sector promotion law to the Standing Committee of the NPC for deliberation and improved the development environment for the private sector.", "breakdown": [["清理废除", "overhauled and abolished", "两个动词并列，overhaul=清理整顿"], ["妨碍全国统一市场的规定做法", "regulations and practices impeding the development of a unified national market", "impeding 现在分词做后置定语"], ["制定实施", "formulated and implemented", "制定=formulate，实施=implement"], ["出台规范…的措施", "adopted measures to regulate...", "出台→adopted"], ["招商引资", "attract investment", "四字压缩为两词"], ["优化国有经济布局", "improve the layout of the state-owned sector", "layout 是\"布局\"的对应词"], ["提请审议", "submitted... for deliberation", "deliberation=审议"], ["民营经济促进法草案", "a draft of the private sector promotion law", "draft 前置"]], "collos": [{"en": "overhaul and abolish", "zh": "清理废除"}, {"en": "formulate and implement", "zh": "制定实施"}, {"en": "improve the layout of", "zh": "优化……布局"}, {"en": "attract investment", "zh": "招商引资"}], "frames": [{"func": "举措句 · 清障型", "pattern": "We [verb1] and [verb2] [对象] impeding [目标]", "example": "We overhauled and abolished regulations and practices impeding the development of a unified national market.", "transfer": "We revised and removed rules impeding fair competition among private firms."}, {"func": "举措句", "pattern": "adopted measures to [do sth]", "example": "adopted measures to regulate steps taken by local governments to attract investment", "transfer": "adopted measures to curb excessive packaging in the delivery industry."}, {"func": "程序句", "pattern": "submitted [文件] to [机构] for deliberation", "example": "submitted a draft of the private sector promotion law to the Standing Committee of the NPC for deliberation", "transfer": "submitted the revised regulation to the State Council for review."}]}, {"type": "practice", "slot": "pm", "dir": "c2e", "mins": 30, "title": "汉译英练习：改革开放", "src": "积极拓展外贸新增长点，进出口结构不断优化，外贸出口对经济增长贡献增大。全面实施跨境服务贸易负面清单。开展增值电信、生物技术、独资医院开放试点。加大单边开放力度，对所有同中国建交的最不发达国家产品全面给予零关税待遇。", "ref": "We actively fostered new growth drivers for foreign trade and steadily improved the import and export mix. These efforts enabled exports to contribute more to China's economic growth. We fully applied the negative list for cross-border trade in services and launched opening-up trials for value-added telecom services, biotechnology, and wholly foreign-owned hospitals. We expanded unilateral opening up, adopting zero tariffs on all products from all the least developed countries that have diplomatic relations with China.", "checks": ["\"增长点\"用了 growth drivers？（不是 growth points）", "\"进出口结构优化\"是 improved the import and export mix？", "\"开放试点\"是 opening-up trials？", "\"独资医院\"是 wholly foreign-owned hospitals？", "\"零关税待遇\"是 zero tariffs？", "\"建交\"是 have diplomatic relations with？"]}, {"type": "review", "slot": "pm", "mins": 30, "title": "滚动复习与术语本", "body": "用10分钟快速过 Day 1-2 的30个词，重点检查： appropriately accommodative monetary policy a basic equilibrium in the balance of payments counter-cyclical adjustments 剩余20分钟整理今天的错误表达进术语本。"}, {"type": "comprehensive", "slot": "pm", "mins": 60, "title": "综合能力刷题", "body": "做一套词汇选择题 + 完形填空，限时40分钟。剩余20分钟对答案。"}]},
{"day": 4, "theme": "开放与外贸", "modules": [{"type": "vocab", "slot": "am", "mins": 30, "title": "背诵热词（12个）", "words": [{"zh": "高水平对外开放", "en": "high-standard opening up", "hint": "❌ high-level"}, {"zh": "外资准入限制", "en": "market access restrictions on foreign investment", "hint": "❌ of"}, {"zh": "各类经营主体", "en": "all market entities", "hint": "❌ subjects"}, {"zh": "跨境服务贸易负面清单", "en": "negative list for cross-border trade in services", "hint": "❌ cross-border service trade"}, {"zh": "增强发展内生动力", "en": "boost the internal momentum of development", "hint": ""}, {"zh": "扩大单方面免签", "en": "offer unilateral visa waivers", "hint": ""}, {"zh": "过境免签", "en": "visa-free transit", "hint": ""}, {"zh": "入境旅游", "en": "inbound tourism", "hint": ""}, {"zh": "重大主场外交", "en": "major diplomatic events hosted at home", "hint": ""}, {"zh": "进出口结构", "en": "the import and export mix", "hint": ""}, {"zh": "增长点", "en": "growth drivers", "hint": ""}, {"zh": "开放试点", "en": "opening-up trials", "hint": ""}], "method": ""}, {"type": "reading", "slot": "am", "mins": 60, "title": "精读段落：开放与外贸", "src": "扩大单方面免签国家范围，过境免签境内停留时间延长至240小时，入境旅游持续升温。高质量共建\"一带一路\"成效显著，一批重大工程、民生项目稳步实施。", "ref": "We offered unilateral visa waivers to more countries and extended visa-free transit stays to 240 hours, thus bringing about a sustained surge in inbound tourism. Impressive strides were made in pursuing high-quality Belt and Road cooperation, and steady progress was secured in a number of major projects and public wellbeing programs.", "breakdown": [["扩大单方面免签国家范围", "offered unilateral visa waivers to more countries", "\"扩大范围\"不翻 expand the scope，直接说 to more countries"], ["过境免签境内停留时间延长至240小时", "extended visa-free transit stays to 240 hours", "一句话搞定，不需要拆成两句"], ["持续升温", "a sustained surge in", "surge 比 warming up 更正式"], ["成效显著", "impressive strides were made in", "strides = 大步进展"], ["一批重大工程", "a number of major projects", "\"一批\"→ a number of"], ["民生项目", "public wellbeing programs", "不是 livelihood projects"], ["稳步实施", "steady progress was secured in", "secured 比 made 更有力"]], "collos": [{"en": "offer visa waivers", "zh": "给予免签"}, {"en": "visa-free transit", "zh": "过境免签"}, {"en": "inbound tourism", "zh": "入境旅游"}, {"en": "impressive strides", "zh": "显著进展"}], "frames": [{"func": "结果衔接句", "pattern": "[举措], thus bringing about [结果]", "example": "We extended visa-free transit stays to 240 hours, thus bringing about a sustained surge in inbound tourism.", "transfer": "We cut approval times by half, thus bringing about a marked rise in new business registrations."}, {"func": "成就句 · 双被动", "pattern": "Impressive strides were made in [A], and steady progress was secured in [B]", "example": "Impressive strides were made in pursuing high-quality Belt and Road cooperation, and steady progress was secured in a number of major projects.", "transfer": "Impressive strides were made in developing green industries, and steady progress was secured in key ecological restoration projects."}, {"func": "扩围句", "pattern": "[动词] [对象] to more [范围]", "example": "We offered unilateral visa waivers to more countries.", "transfer": "We extended the pilot program to more provinces."}]}, {"type": "practice", "slot": "pm", "dir": "c2e", "mins": 30, "title": "汉译英练习：开放与外贸", "src": "出台实施新型城镇化战略五年行动计划，扎实推进城市更新，常住人口城镇化率提高到67%。坚持不懈夯实农业基础，防灾减灾和综合生产能力稳步提高，乡村全面振兴取得新成效。出台一批区域发展政策，实施一批区域重大项目，健全主体功能区制度政策，区域融合发展取得新进展。", "ref": "We rolled out a five-year action plan for implementing the new urbanization strategy and made solid progress in urban renewal, while the share of permanent urban residents in the total population climbed to 67 percent. We continued efforts to consolidate the foundations of agriculture and steadily built up the agricultural sector's capacity for disaster prevention and mitigation and overall production. New achievements were made in advancing all-around rural revitalization. We secured further headway in promoting integrated regional development by introducing a range of regional development policies, implementing a set of major regional programs, and improving functional zoning systems and policies.", "checks": ["\"出台实施\"是 rolled out？", "\"常住人口城镇化率\"是 the share of permanent urban residents in the total population？", "\"提高到67%\"是 climbed to 67 percent？", "\"夯实农业基础\"是 consolidate the foundations of agriculture？", "\"防灾减灾\"是 disaster prevention and mitigation？", "\"乡村全面振兴\"是 all-around rural revitalization？", "\"主体功能区\"是 functional zoning？"]}, {"type": "review", "slot": "pm", "mins": 30, "title": "滚动复习与术语本", "body": "快速过 Day 1-3 的45个词（每个2秒闪过），标出仍然卡壳的词重点写3遍。 重点检查这几个长词组能否一口气说出来： negative list for cross-border trade in services market access restrictions on foreign investment appropriately accommodative monetary policy"}, {"type": "comprehensive", "slot": "pm", "mins": 60, "title": "综合能力刷题", "body": "做一套阅读理解（4篇），限时40分钟。剩余20分钟对答案、标记生词。"}]},
{"day": 5, "theme": "科技强国", "modules": [{"type": "vocab", "slot": "am", "mins": 30, "title": "背诵热词（15个）", "words": [{"zh": "创新驱动发展", "en": "innovation-driven development", "hint": "driven 是核心词"}, {"zh": "科技自立自强", "en": "self-reliance and strength in science and technology", "hint": "两个名词并列"}, {"zh": "关键核心技术攻关", "en": "breakthroughs in core technologies in key fields", "hint": "攻关=breakthroughs"}, {"zh": "原始创新", "en": "original innovation", "hint": "不是 primitive"}, {"zh": "科技创新和产业创新深度融合", "en": "full integration between technological and industrial innovation", "hint": "between...and..."}, {"zh": "人工智能", "en": "artificial intelligence (AI)", "hint": "基础词"}, {"zh": "集成电路", "en": "integrated circuits", "hint": "不是 chips"}, {"zh": "量子科技", "en": "quantum technology", "hint": ""}, {"zh": "数字经济", "en": "digital economy", "hint": ""}, {"zh": "数字中国建设", "en": "Digital China Initiative", "hint": "Initiative 大写"}, {"zh": "新兴产业", "en": "emerging industries", "hint": "emerging 不是 new"}, {"zh": "未来产业", "en": "industries of the future", "hint": "of the future 后置"}, {"zh": "先进制造业集群", "en": "advanced manufacturing clusters", "hint": "clusters=集群"}, {"zh": "产业升级", "en": "industrial upgrading", "hint": "upgrading 名词形式"}, {"zh": "拔尖创新人才", "en": "first-class innovators", "hint": "不是 top talents"}], "method": ""}, {"type": "reading", "slot": "am", "mins": 60, "title": "精读段落：科技强国", "src": "推进科技强国建设，全面启动实施国家科技重大专项，加快完善重大科技基础设施体系，加强拔尖创新人才培养。稳定工业经济运行，推进制造业技术改造升级，制造业投资增长9.2%。", "ref": "To boost China's strength in science and technology, we rolled out major national science and technology programs across the board, worked faster to improve major science and technology infrastructure, and redoubled efforts to cultivate first-class innovators. We ensured stable performance in the industrial sector and advanced technological transformation and upgrading in the manufacturing sector, which saw a 9.2-percent increase in investment.", "breakdown": [["推进科技强国建设", "To boost China's strength in science and technology", "用 To 引导目的状语，不翻\"建设\""], ["全面启动实施", "rolled out... across the board", "across the board = 全面"], ["国家科技重大专项", "major national science and technology programs", "专项=programs"], ["加快完善", "worked faster to improve", "加快=faster，完善=improve"], ["重大科技基础设施体系", "major science and technology infrastructure", "体系不翻，infrastructure 本身含\"体系\"意"], ["加强拔尖创新人才培养", "redoubled efforts to cultivate first-class innovators", "redoubled efforts=加强/加大力度"], ["稳定工业经济运行", "ensured stable performance in the industrial sector", "运行=performance"], ["技术改造升级", "technological transformation and upgrading", "改造=transformation"], ["制造业投资增长9.2%", "which saw a 9.2-percent increase in investment", "which saw 引导非限定从句，很地道"]], "collos": [{"en": "launch major programs", "zh": "启动重大专项"}, {"en": "build up strength", "zh": "增强实力"}, {"en": "a science and technology powerhouse", "zh": "科技强国"}, {"en": "across the board", "zh": "全面"}], "frames": [{"func": "推进句", "pattern": "We moved forward with building [目标], and launched [举措] across the board", "example": "We moved forward with building China into a science and technology powerhouse and fully launched major national science and technology programs.", "transfer": "We moved forward with building a modern energy system and fully launched key grid-upgrading projects."}, {"func": "目标句", "pattern": "build [主体] into [愿景]", "example": "build China into a science and technology powerhouse", "transfer": "build the region into an international shipping hub"}]}, {"type": "practice", "slot": "pm", "dir": "c2e", "mins": 30, "title": "汉译英练习：科技强国", "src": "新培育一批国家级先进制造业集群，商业航天、北斗应用、新型储能等新兴产业快速发展。制定修订环保、安全等强制性国家标准。加快数字中国建设，数字经济核心产业增加值占国内生产总值比重达到10%左右。", "ref": "We fostered a new batch of national-level advanced manufacturing clusters and achieved rapid growth in emerging industries, including commercial space, applications of the BeiDou Navigation Satellite System, and new types of energy storage. Mandatory national standards such as those for environmental protection and safety were formulated or revised. Thanks to swift development of the Digital China Initiative, the value added of core industries of the digital economy rose to about 10 percent of GDP.", "checks": ["\"培育一批\"用了 fostered a new batch of？", "\"商业航天\"是 commercial space？", "\"北斗应用\"是 applications of the BeiDou Navigation Satellite System？", "\"强制性国家标准\"是 mandatory national standards？", "\"制定修订\"是 formulated or revised？", "\"增加值占比达到10%\"是 the value added of... rose to about 10 percent of GDP？", "\"数字中国建设\"首字母大写了吗？Digital China Initiative"]}, {"type": "review", "slot": "pm", "mins": 30, "title": "滚动复习与术语本", "body": "快速过 Day 1-4 的词（60个），每个2秒。重点检查： unified national market（不是 united） high-standard opening up（不是 high-level） market access restrictions on foreign investment（介词 on） 把今天精读中 \"which saw a X-percent increase\" 这个句式抄进术语本，标注为\"数据引入万能句式\"。"}, {"type": "comprehensive", "slot": "pm", "mins": 60, "title": "综合能力刷题", "body": "做一套完形填空 + 词汇选择题，限时40分钟。剩余20分钟对答案。"}]},
{"day": 6, "theme": "科技成果", "modules": [{"type": "vocab", "slot": "am", "mins": 20, "title": "背诵热词（10个）", "words": [{"zh": "技术合同成交额", "en": "the value of technology contract transactions", "hint": "value 不是 amount"}, {"zh": "强制性国家标准", "en": "mandatory national standards", "hint": "mandatory=强制性"}, {"zh": "高技术制造业", "en": "high-tech manufacturing", "hint": ""}, {"zh": "装备制造业", "en": "equipment manufacturing", "hint": ""}, {"zh": "新能源汽车", "en": "new-energy vehicles", "hint": "注意连字符"}, {"zh": "商业航天", "en": "commercial space", "hint": "不是 business aerospace"}, {"zh": "北斗应用", "en": "applications of the BeiDou Navigation Satellite System", "hint": "全称记住"}, {"zh": "增加值", "en": "value added", "hint": "两个词，不加连字符"}, {"zh": "建成入列", "en": "was delivered and commissioned", "hint": "commissioned=入列/服役"}, {"zh": "月球背面采样返回", "en": "sample collection from the far side of the moon", "hint": "far side 不是 back"}], "method": ""}, {"type": "reading", "slot": "am", "mins": 60, "title": "精读段落：科技成果", "src": "创新能力有新提升，集成电路、人工智能、量子科技等领域取得新成果；\"嫦娥六号\"实现人类首次月球背面采样返回，\"梦想\"号大洋钻探船建成入列；技术合同成交额增长11.2%。", "ref": "Further enhancements in innovation capacity: New achievements were made in integrated circuits, artificial intelligence (AI), quantum technology, and other areas. The Chang'e-6 mission completed humanity's first-ever sample collection from the far side of the moon, and the Mengxiang ocean drilling vessel was delivered and commissioned. The value of technology contract transactions increased by 11.2 percent.", "breakdown": [["创新能力有新提升", "Further enhancements in innovation capacity", "用名词短语概括，不用完整句"], ["取得新成果", "New achievements were made in", "被动句式，正式"], ["集成电路、人工智能、量子科技等领域", "integrated circuits, AI, quantum technology, and other areas", "列举后加 and other areas"], ["实现人类首次", "completed humanity's first-ever", "first-ever 比 first 更强调"], ["月球背面采样返回", "sample collection from the far side of the moon", "far side = 背面"], ["建成入列", "was delivered and commissioned", "两个动作：交付+服役"], ["成交额增长11.2%", "increased by 11.2 percent", "increased by = 增长了"]], "collos": [{"en": "make new gains", "zh": "有新提升"}, {"en": "value added", "zh": "增加值"}, {"en": "be delivered and commissioned", "zh": "建成入列"}, {"en": "far side of the moon", "zh": "月球背面"}], "frames": [{"func": "领域列举句", "pattern": "New gains were made in [领域A], [领域B], and [领域C]", "example": "New gains were made in innovation capacity, with breakthroughs in integrated circuits, AI, and quantum technology.", "transfer": "New gains were made in green transition, with progress in wind power, energy storage, and smart grids."}, {"func": "数据句 · 增加值", "pattern": "The value added of [产业] grew by [X] percent", "example": "The value added of high-tech manufacturing grew by 8.9 percent.", "transfer": "The value added of the digital economy grew by 10 percent."}]}, {"type": "practice", "slot": "pm", "dir": "c2e", "mins": 30, "title": "汉译英练习：科技成果", "src": "推动房地产市场止跌回稳，下调住房贷款利率和首付比例，居民存量房贷利息年支出减少约1500亿元，降低交易环节税费水平，扎实推进保交房工作。积极稳定资本市场，加快完善基础性制度，创设互换便利、回购增持再贷款等工具，市场活跃度上升。", "ref": "Efforts were made to stem the downturn and restore stability in the real estate market. We reduced interest rates for housing loans and the ratios of down payments, and achieved an annual reduction of about 150 billion yuan in interest payments for existing mortgages. Taxes and fees on housing transactions were also cut, while solid progress was made in ensuring the timely delivery of housing projects. We worked actively to maintain stable performance of the capital market. We moved faster to refine foundational systems and introduced new monetary policy tools, including a swap facility for securities, funds, and insurance companies and a lending facility for share buybacks and shareholding increases, which led to a surge in market activity.", "checks": ["\"止跌回稳\"是 stem the downturn and restore stability？", "\"首付比例\"是 ratios of down payments？", "\"存量房贷\"是 existing mortgages？", "1500亿元换算对了吗？→ 150 billion yuan", "\"保交房\"是 ensuring the timely delivery of housing projects？", "\"基础性制度\"是 foundational systems？", "\"互换便利\"是 swap facility？", "\"回购增持再贷款\"是 lending facility for share buybacks and shareholding increases？", "\"市场活跃度上升\"是 a surge in market activity？"]}, {"type": "review", "slot": "pm", "mins": 30, "title": "滚动复习与术语本", "body": "快速过 Day 1-5 的75个词。今天重点默写以下长搭配（不看原文写一遍）： negative list for cross-border trade in services market access restrictions on foreign investment breakthroughs in core technologies in key fields full integration between technological and industrial innovation appropriately accommodative monetary policy 把今天练习中房地产相关的一组词整理进术语本： 止跌回稳 / 首付比例 / 存量房贷 / 保交房 / 互换便利"}, {"type": "comprehensive", "slot": "pm", "mins": 60, "title": "综合能力刷题", "body": "做一套阅读理解（4篇），限时40分钟。剩余20分钟对答案、标记生词。"}]},
{"day": 7, "theme": "就业民生", "modules": [{"type": "vocab", "slot": "am", "mins": 30, "title": "背诵热词（15个）", "words": [{"zh": "民生福祉", "en": "the people's wellbeing", "hint": "wellbeing 一个词，不加连字符"}, {"zh": "高质量充分就业", "en": "high-quality full employment", "hint": "full 不能漏"}, {"zh": "城镇新增就业", "en": "new urban jobs created", "hint": "被动形式"}, {"zh": "城镇调查失业率", "en": "surveyed urban unemployment rate", "hint": "surveyed 是关键词"}, {"zh": "居民人均可支配收入", "en": "per capita disposable income", "hint": "per capita 不加连字符"}, {"zh": "脱贫攻坚成果", "en": "achievements in poverty alleviation", "hint": "alleviation 不是 elimination"}, {"zh": "乡村全面振兴", "en": "all-around rural revitalization", "hint": "all-around 有连字符"}, {"zh": "共同富裕", "en": "common prosperity", "hint": "简洁两词"}, {"zh": "社会保障", "en": "social security", "hint": ""}, {"zh": "基本养老保险", "en": "basic old-age insurance", "hint": "old-age 有连字符"}, {"zh": "基本医疗保险", "en": "basic medical insurance", "hint": ""}, {"zh": "义务教育", "en": "compulsory education", "hint": "compulsory 不是 mandatory"}, {"zh": "\"双减\"", "en": "reducing students' burdens from homework and off-campus tutoring", "hint": "官方全称很长，记住核心"}, {"zh": "新型城镇化", "en": "new urbanization", "hint": "不加 type/model"}, {"zh": "\"一老一小\"", "en": "elderly care and childcare", "hint": "简洁对仗"}], "method": ""}, {"type": "reading", "slot": "am", "mins": 60, "title": "精读段落：就业民生", "src": "出台促进高质量充分就业的政策措施，强化对企业吸纳就业的支持，高校毕业生、脱贫人口、农民工等重点群体就业保持稳定。推进教育强国建设。提高义务教育阶段家庭经济困难学生生活补助标准。国家奖助学金提标扩面、助学贷款提额降息，惠及学生3400多万人次。", "ref": "We adopted new policy measures to promote high-quality and full employment, supported businesses in creating new jobs, and ensured stable employment among key groups, including college graduates, people lifted out of poverty, and rural migrant workers. We worked to build a strong educational system for China. Living allowances were increased for students with financial difficulties in the compulsory education stage. We increased the standards and expanded the coverage of government scholarships and grants. The cap on government-subsidized student loans was raised and the interest rates were lowered. Students across the country benefited from these measures on over 34 million occasions.", "breakdown": [["出台促进…的政策措施", "adopted new policy measures to promote", "出台=adopted"], ["强化对企业吸纳就业的支持", "supported businesses in creating new jobs", "\"吸纳就业\"意译为 creating new jobs，不是 absorb employment"], ["高校毕业生", "college graduates", "不是 university graduates"], ["脱贫人口", "people lifted out of poverty", "lifted out of 比 escaped from 更准确"], ["农民工", "rural migrant workers", "三个词缺一不可"], ["重点群体", "key groups", "简洁"], ["教育强国建设", "build a strong educational system for China", "和\"科技强国\"句式不同，注意灵活"], ["家庭经济困难学生", "students with financial difficulties", "不是 poor students"], ["生活补助标准", "living allowance standards → living allowances were increased", "被动句"], ["提标扩面", "increased the standards and expanded the coverage", "四字拆成两个动作"], ["提额降息", "the cap was raised and the interest rates were lowered", "同样拆成两个动作"], ["惠及学生3400多万人次", "students benefited from these measures on over 34 million occasions", "\"人次\"→ occasions"]], "collos": [{"en": "high-quality full employment", "zh": "高质量充分就业"}, {"en": "adopt policies and measures", "zh": "出台政策措施"}, {"en": "strengthen support for", "zh": "强化对……支持"}, {"en": "public wellbeing", "zh": "民生福祉"}], "frames": [{"func": "举措句 · 出台型", "pattern": "We adopted policies and measures to promote [目标] and strengthened support for [对象]", "example": "We adopted policies and measures to promote high-quality full employment and strengthened support for enterprises.", "transfer": "We adopted policies and measures to promote elderly care services and strengthened support for community providers."}, {"func": "民生保障句", "pattern": "greater support was provided for [A], [B], and [C]", "example": "Greater support was provided for compulsory education, basic old-age insurance, and social assistance.", "transfer": "Greater support was provided for childcare, affordable housing, and rural healthcare."}]}, {"type": "practice", "slot": "pm", "dir": "c2e", "mins": 30, "title": "汉译英练习：就业民生", "src": "巩固\"双减\"成果，持续优化基础教育生态。推进医疗机构检查检验结果互认，扩大基层慢性病、常见病用药种类。扎实做好重点传染病防治。扩大职工医保个人账户共济范围。提高城乡居民基础养老金和退休人员基本养老金。", "ref": "We consolidated the gains of initiatives launched to relieve students of excessive burdens from homework and off-campus tutoring, bringing about a further improvement in the basic education environment. We made continued progress in advancing mutual recognition of clinical test results from different medical institutions and permitted community clinics to prescribe a wider range of medicines for chronic and common diseases. We took concrete steps to prevent and control key infectious diseases. Under the basic medical insurance scheme, urban workers were granted greater scope to use personal accounts for family members. Basic old-age benefits for rural and non-working urban residents and basic pension benefits for retirees were increased.", "checks": ["\"巩固成果\"是 consolidated the gains of？", "\"双减\"的完整表述写对了吗？relieve students of excessive burdens from homework and off-campus tutoring", "\"基础教育生态\"是 basic education environment？", "\"检查检验结果互认\"是 mutual recognition of clinical test results？", "\"基层慢性病、常见病用药种类\"是 permitted community clinics to prescribe a wider range of medicines for chronic and common diseases？", "\"传染病防治\"是 prevent and control infectious diseases？", "\"个人账户共济范围\"是 greater scope to use personal accounts for family members？", "\"基础养老金\"是 basic old-age benefits？"]}, {"type": "review", "slot": "pm", "mins": 30, "title": "滚动复习与术语本", "body": "快速过 Day 1-6 的词（约75个）。今天重点默写以下医疗/教育类搭配： mutual recognition of clinical test results（检查检验结果互认） compulsory education（义务教育） basic old-age insurance（基本养老保险） per capita disposable income（人均可支配收入） achievements in poverty alleviation（脱贫攻坚成果） 把今天练习中的医疗教育类新词整理进术语本。"}, {"type": "comprehensive", "slot": "pm", "mins": 60, "title": "综合能力刷题", "body": "做一套词汇选择题 + 阅读理解（2篇），限时40分钟。剩余20分钟对答案。"}]},
{"day": 8, "theme": "社会保障", "modules": [{"type": "vocab", "slot": "am", "mins": 20, "title": "背诵热词（10个）", "words": [{"zh": "银发经济", "en": "silver economy", "hint": "silver=银发"}, {"zh": "残疾人权益保障", "en": "safeguards for the rights and interests of people with disabilities", "hint": "很长，分段记"}, {"zh": "低保", "en": "subsistence allowance", "hint": "subsistence=最低生活"}, {"zh": "社会救助", "en": "social assistance", "hint": "assistance 不是 aid"}, {"zh": "一次性生活补助", "en": "one-off living allowances", "hint": "one-off=一次性"}, {"zh": "检查检验结果互认", "en": "mutual recognition of clinical test results", "hint": "mutual=互认"}, {"zh": "慢性病", "en": "chronic diseases", "hint": "chronic 不是 long-term"}, {"zh": "传染病防治", "en": "prevention and control of infectious diseases", "hint": "注意语序"}, {"zh": "优抚补助", "en": "subsidies for entitled groups", "hint": "entitled groups=优抚对象"}, {"zh": "困难群众", "en": "people in difficulty", "hint": "不是 poor people"}], "method": ""}, {"type": "reading", "slot": "am", "mins": 60, "title": "精读段落：社会保障", "src": "提高城乡居民基础养老金和退休人员基本养老金。深化养老服务改革，制定促进银发经济发展的政策。强化残疾人权益保障。提高优抚补助标准。健全低保标准确定和调整机制，拓展救助对象范围。向困难群众发放一次性生活补助，惠及1100多万人。", "ref": "Basic old-age benefits for rural and non-working urban residents and basic pension benefits for retirees were increased. We deepened the reform of elderly care services and formulated policies to promote the development of the silver economy. We strengthened safeguards for the rights and interests of people with disabilities and increased subsidies for entitled groups. We improved the mechanism to set and adjust subsistence allowance standards and expanded the coverage of this program. We provided one-off living allowances to over 11 million people in difficulty.", "breakdown": [["城乡居民基础养老金", "basic old-age benefits for rural and non-working urban residents", "\"城乡居民\"拆成 rural and non-working urban residents"], ["退休人员基本养老金", "basic pension benefits for retirees", "pension=退休金，区别于 old-age benefits"], ["深化养老服务改革", "deepened the reform of elderly care services", "elderly care=养老"], ["银发经济", "silver economy", "直译，已成固定表达"], ["强化残疾人权益保障", "strengthened safeguards for the rights and interests of people with disabilities", "注意 people with disabilities 而非 disabled people"], ["优抚补助标准", "subsidies for entitled groups", "entitled groups 是官方对\"优抚对象\"的译法"], ["健全…机制", "improved the mechanism to...", "健全=improved（不是 perfected）"], ["低保标准确定和调整", "set and adjust subsistence allowance standards", "set and adjust 对应\"确定和调整\""], ["拓展救助对象范围", "expanded the coverage of this program", "范围→coverage"], ["困难群众", "people in difficulty", "简洁正式"], ["惠及1100多万人", "over 11 million people", "万→换算成 million"]], "phrases": ["basic old-age benefits — 基础养老金（城乡居民）", "basic pension benefits for retirees — 退休人员基本养老金", "elderly care services — 养老服务", "silver economy — 银发经济", "people with disabilities — 残疾人（政治正确表达）", "subsidies for entitled groups — 优抚补助", "improved the mechanism to set and adjust — 健全…确定和调整机制", "subsistence allowance standards — 低保标准", "expanded the coverage of — 拓展…范围", "people in difficulty — 困难群众"]}, {"type": "practice", "slot": "pm", "dir": "c2e", "mins": 30, "title": "汉译英练习：社会保障", "src": "完善全国年节及纪念日放假办法。繁荣发展文化事业和文化产业，文化和旅游市场持续活跃。扎实筹办第九届亚洲冬季运动会，成功举办第十二届全国少数民族传统体育运动会，我国体育健儿在巴黎奥运会取得境外参赛最好成绩。", "ref": "We refined the measures for national public holidays and memorial days. Cultural programs and industries were boosted, and cultural and tourism markets continued to thrive. We made good preparations for the 9th Asian Winter Games and successfully hosted the 12th National Traditional Games of Ethnic Minorities of the People's Republic of China. Chinese athletes achieved their best overseas Olympic performance at the Paris Olympics.", "checks": ["\"完善放假办法\"是 refined the measures for？", "\"年节及纪念日\"是 national public holidays and memorial days？", "\"繁荣发展\"是 were boosted？（被动）", "\"持续活跃\"是 continued to thrive？", "\"扎实筹办\"是 made good preparations for？", "\"少数民族传统体育运动会\"全称翻对了吗？National Traditional Games of Ethnic Minorities", "\"境外参赛最好成绩\"是 best overseas Olympic performance？", "\"体育健儿\"是 Chinese athletes？（不需要翻\"健儿\"）"]}, {"type": "review", "slot": "pm", "mins": 30, "title": "滚动复习与术语本", "body": "快速过 Day 1-7 的词（约90个）。今天重点对比以下易混词： | **容易混淆** | **区别** | | --| --| | basic old-age benefits | 城乡居民基础养老金 | | basic pension benefits | 退休人员基本养老金 | | basic old-age insurance | 基本养老保险（制度名称） | | social security | 社会保障（大概念） | | social assistance | 社会救助（具体措施） | | subsistence allowance | 低保（最低生活保障） | 把今天的民生类词汇按\"教育—医疗—养老—救助\"四个小类整理进术语本。"}, {"type": "comprehensive", "slot": "pm", "mins": 60, "title": "综合能力刷题", "body": "做一套阅读理解（4篇），限时40分钟。剩余20分钟对答案、标记生词。"}]},
{"day": 9, "theme": "绿色低碳", "modules": [{"type": "vocab", "slot": "am", "mins": 30, "title": "背诵热词（15个）", "words": [{"zh": "绿色低碳发展", "en": "green and low-carbon development", "hint": "and 不能漏"}, {"zh": "碳达峰碳中和", "en": "peaking carbon emissions and achieving carbon neutrality", "hint": "两个动名词并列"}, {"zh": "单位GDP能耗", "en": "energy consumption per unit of GDP", "hint": "per unit of"}, {"zh": "单位GDP二氧化碳排放", "en": "carbon dioxide emissions per unit of GDP", "hint": "同上结构"}, {"zh": "可再生能源", "en": "renewable energy", "hint": ""}, {"zh": "非化石能源", "en": "non-fossil fuels/energy", "hint": "non- 前缀"}, {"zh": "新能源汽车", "en": "new-energy vehicles", "hint": "连字符 new-energy"}, {"zh": "生态文明建设", "en": "ecological conservation", "hint": "不翻\"文明建设\""}, {"zh": "美丽中国", "en": "Beautiful China", "hint": "大写 B"}, {"zh": "全面绿色转型", "en": "green transition across the board", "hint": "across the board=全面"}, {"zh": "细颗粒物（PM2.5）", "en": "fine particulate matter (PM2.5)", "hint": "particulate 拼写注意"}, {"zh": "污染防治", "en": "pollution prevention and control", "hint": "prevention and control 固定搭配"}, {"zh": "节能降碳", "en": "energy conservation and carbon reduction", "hint": "conservation 不是 saving"}, {"zh": "新型储能", "en": "new types of energy storage", "hint": ""}, {"zh": "温室气体自愿减排", "en": "voluntary greenhouse gas emission reduction", "hint": "词组很长，整体记"}], "method": ""}, {"type": "reading", "slot": "am", "mins": 60, "title": "精读段落：绿色低碳", "src": "强化生态环境综合治理，主要污染物排放量继续下降。深入实施重要生态系统保护和修复重大工程，荒漠化、沙化土地面积持续\"双缩减\"。生物多样性保护取得积极成效，大量珍稀濒危野生动植物种群稳步增长。", "ref": "We stepped up comprehensive efforts to improve the environment and achieved yet another drop in the discharge of major pollutants. We implemented major projects for protecting and restoring key ecosystems and realized a further reduction in the areas of both deserts and sandy lands. Progress was made in biodiversity conservation and the populations of many rare and endangered wildlife species increased steadily.", "breakdown": [["强化生态环境综合治理", "stepped up comprehensive efforts to improve the environment", "\"强化\"=stepped up；\"综合治理\"=comprehensive efforts to improve"], ["主要污染物排放量继续下降", "achieved yet another drop in the discharge of major pollutants", "yet another=继续（强调不是第一次）"], ["深入实施…重大工程", "implemented major projects for...", "深入实施=implemented（不需要翻\"深入\"）"], ["保护和修复", "protecting and restoring", "修复=restoring 不是 repairing"], ["重要生态系统", "key ecosystems", "重要=key"], ["荒漠化、沙化土地面积", "the areas of both deserts and sandy lands", "both...and... 对应\"双\""], ["持续\"双缩减\"", "realized a further reduction in... both...", "双缩减=两个都缩减"], ["生物多样性保护", "biodiversity conservation", "一个词 biodiversity"], ["取得积极成效", "progress was made in", "被动句"], ["珍稀濒危野生动植物种群", "rare and endangered wildlife species", "种群=species（这里不翻 populations）"], ["稳步增长", "increased steadily", ""]], "phrases": ["stepped up comprehensive efforts to improve — 强化…综合治理", "yet another drop in the discharge of — 排放量继续下降", "protecting and restoring key ecosystems — 保护和修复重要生态系统", "a further reduction in the areas of both... and... — 面积持续双缩减", "biodiversity conservation — 生物多样性保护", "rare and endangered wildlife species — 珍稀濒危野生动植物"]}, {"type": "practice", "slot": "pm", "dir": "c2e", "mins": 30, "title": "汉译英练习：绿色低碳", "src": "推动重点行业节能降碳改造，推进新能源开发利用，非化石能源发电量占总发电量的比重接近40%。启动全国温室气体自愿减排交易市场。全国碳排放权交易更趋活跃。", "ref": "We pushed ahead with upgrading in key industries for energy conservation and carbon reduction and advanced the development and use of new energy sources. The share of electricity generated from non-fossil fuels increased, accounting for close to 40 percent of total power generation. We launched the National Voluntary Greenhouse Gas Emission Reduction Trading Market, and carbon emissions trading in China became increasingly brisk.", "checks": ["\"节能降碳改造\"是 upgrading... for energy conservation and carbon reduction？", "\"推进新能源开发利用\"是 advanced the development and use of new energy sources？", "\"非化石能源发电量占总发电量比重\"是 the share of electricity generated from non-fossil fuels... of total power generation？", "\"接近40%\"是 close to 40 percent？", "\"温室气体自愿减排交易市场\"全称翻对了吗？National Voluntary Greenhouse Gas Emission Reduction Trading Market", "\"碳排放权交易\"是 carbon emissions trading？", "\"更趋活跃\"是 became increasingly brisk？"]}, {"type": "review", "slot": "pm", "mins": 30, "title": "滚动复习与术语本", "body": "快速过 Day 1-8 的词（约90个）。今天重点默写以下绿色类长搭配： peaking carbon emissions and achieving carbon neutrality（碳达峰碳中和） energy consumption per unit of GDP（单位GDP能耗） voluntary greenhouse gas emission reduction（温室气体自愿减排） fine particulate matter（细颗粒物） green transition across the board（全面绿色转型）"}, {"type": "comprehensive", "slot": "pm", "mins": 60, "title": "综合能力刷题", "body": "做一套完形填空 + 词汇选择题，限时40分钟。剩余20分钟对答案。"}]},
{"day": 10, "theme": "年度部署", "modules": [{"type": "vocab", "slot": "am", "mins": 20, "title": "背诵热词（10个）", "words": [{"zh": "生物多样性", "en": "biodiversity", "hint": "一个词"}, {"zh": "珍稀濒危野生动植物", "en": "rare and endangered wildlife species", "hint": ""}, {"zh": "荒漠化", "en": "desertification / deserts", "hint": "两种说法"}, {"zh": "沙化", "en": "sandy lands", "hint": ""}, {"zh": "碳排放权交易", "en": "carbon emissions trading", "hint": ""}, {"zh": "新增装机", "en": "installed capacity grew by", "hint": "装机=installed capacity"}, {"zh": "优良天数比例", "en": "proportion of days with good or excellent air quality", "hint": "很长但高频"}, {"zh": "地表水优良水质", "en": "surface water with a good quality rating", "hint": ""}, {"zh": "发电量", "en": "electricity generated / power generation", "hint": ""}, {"zh": "更趋活跃", "en": "became increasingly brisk", "hint": "brisk=活跃"}], "method": ""}, {"type": "reading", "slot": "am", "mins": 60, "title": "精读段落：年度部署", "src": "因地制宜发展新质生产力，纵深推进全国统一大市场建设，持续防范化解重点领域风险，着力稳就业、稳企业、稳市场、稳预期，推动经济实现质的有效提升和量的合理增长，保持社会和谐稳定，实现\"十五五\"良好开局。", "ref": "We will develop new quality productive forces in light of local conditions, advance the development of a unified national market, continue to prevent and defuse risks in key areas, provide greater support to keep employment, enterprise operations, markets, and expectations stable, promote higher-quality economic growth while achieving an appropriate increase in economic output, maintain social harmony and stability, and ensure that we get off to a good start in the 15th Five-Year Plan period.", "breakdown": [["因地制宜", "in light of local conditions", "固定搭配，不要翻成 according to"], ["发展新质生产力", "develop new quality productive forces", "直译即可"], ["纵深推进", "advance", "一个词搞定\"纵深推进\""], ["持续防范化解", "continue to prevent and defuse", "prevent and defuse 固定搭配"], ["着力", "provide greater support to", "或省略不翻"], ["稳就业、稳企业、稳市场、稳预期", "keep employment, enterprise operations, markets, and expectations stable", "四个\"稳\"合成一句，stable 放最后"], ["质的有效提升和量的合理增长", "higher-quality economic growth while achieving an appropriate increase in economic output", "while 连接两层意思"], ["保持社会和谐稳定", "maintain social harmony and stability", ""], ["实现良好开局", "get off to a good start", "习语"], ["\"十五五\"", "the 15th Five-Year Plan period", "注意 period"]], "phrases": ["in light of local conditions — 因地制宜", "prevent and defuse risks in key areas — 防范化解重点领域风险", "keep... stable — 稳…（四个\"稳\"的万能结构）", "higher-quality growth while achieving an appropriate increase in output — 质的有效提升和量的合理增长", "get off to a good start — 良好开局", "the 15th Five-Year Plan period — \"十五五\"时期"]}, {"type": "practice", "slot": "pm", "dir": "c2e", "mins": 30, "title": "汉译英练习：年度部署", "src": "生态环境质量有新改善，地级及以上城市细颗粒物（PM2.5）平均浓度下降2.7%，优良天数比例上升至87.2%，地表水优良水质断面比例提高到90.4%；单位国内生产总值能耗降幅超过3%；可再生能源新增装机3.7亿千瓦。", "ref": "New improvements in the environment: In cities at and above the prefectural level, the average concentration of fine particulate matter (PM2.5) fell by 2.7 percent, and the proportion of days with good or excellent air quality rose to 87.2 percent. The proportion of surface water with a good quality rating reached 90.4 percent. Energy consumption per unit of GDP dropped by more than 3 percent, and installed renewable energy capacity grew by 370 million kilowatts.", "checks": ["\"地级及以上城市\"是 in cities at and above the prefectural level？", "\"平均浓度下降2.7%\"是 the average concentration... fell by 2.7 percent？", "\"优良天数比例上升至87.2%\"是 the proportion of days with good or excellent air quality rose to 87.2 percent？", "\"地表水优良水质断面比例\"是 the proportion of surface water with a good quality rating？", "\"单位GDP能耗降幅超过3%\"是 energy consumption per unit of GDP dropped by more than 3 percent？", "\"可再生能源新增装机3.7亿千瓦\"换算对了吗？→ 370 million kilowatts", "\"新增装机\"是 installed... capacity grew by？"]}, {"type": "review", "slot": "pm", "mins": 30, "title": "滚动复习与术语本", "body": "快速过 Day 1-9 的词（约100个）。今天重点对比以下环保类数据表达： | **中文动作** | **英文表达** | **适用场景** | | --| --| --| | 下降了X% | fell by / dropped by X percent | 浓度、能耗下降 | | 上升至X% | rose to X percent | 比例上升到某值 | | 提高到X% | reached / climbed to X percent | 同上 | | 降幅超过X% | dropped by more than X percent | 强调\"超过\" | | 新增X | grew by X | 装机、就业新增 | | 接近X% | close to / nearly X percent | 约数 | 这些数据表达在三笔考试中极其高频，务必烂熟于心。"}, {"type": "comprehensive", "slot": "pm", "mins": 60, "title": "综合能力刷题", "body": "做一套阅读理解（4篇），限时40分钟。剩余20分钟对答案、标记生词。"}]},
{"day": 11, "theme": "财政金融", "modules": [{"type": "vocab", "slot": "am", "mins": 30, "title": "背诵热词（15个）", "words": [{"zh": "防范化解重点领域风险", "en": "prevent and defuse risks in key areas", "hint": "defuse=化解"}, {"zh": "地方政府债务", "en": "local government debt", "hint": ""}, {"zh": "房地产市场止跌回稳", "en": "stem the downturn and restore stability in the real estate market", "hint": "stem=遏制"}, {"zh": "保交房", "en": "ensuring timely delivery of housing projects", "hint": "timely delivery"}, {"zh": "资本市场", "en": "capital market", "hint": ""}, {"zh": "金融风险", "en": "financial risks", "hint": ""}, {"zh": "国家安全", "en": "national security", "hint": ""}, {"zh": "社会治理", "en": "social governance", "hint": "governance 不是 management"}, {"zh": "依法行政", "en": "law-based government administration", "hint": "law-based 有连字符"}, {"zh": "全面从严治党", "en": "full and rigorous Party self-governance", "hint": "rigorous=严格"}, {"zh": "反腐败", "en": "combating corruption", "hint": "combating 不是 fighting"}, {"zh": "应急管理", "en": "emergency management", "hint": ""}, {"zh": "安全生产", "en": "workplace safety", "hint": "不是 production safety"}, {"zh": "粮食安全", "en": "food security", "hint": "security 不是 safety"}, {"zh": "能源安全", "en": "energy security", "hint": ""}], "method": "治理安全类词汇正式感强，重点记 stem / defuse / rigorous / governance 的拼写。注意 security 和 safety 的区别：security 侧重\"保障/安全体系\"，safety 侧重\"人身安全\"。"}, {"type": "reading", "slot": "am", "mins": 60, "title": "精读段落：财政金融", "src": "继续实施更加积极的财政政策。继续实施适度宽松的货币政策。强化改革举措与宏观政策协同。增强政策前瞻性针对性协同性。", "ref": "We will continue to implement a more proactive fiscal policy. We will continue to apply an appropriately accommodative monetary policy. We will improve coordination between reform measures and macro policies. We will make our policies more forward-looking, targeted, and coordinated.", "breakdown": [["继续实施", "continue to implement / apply", "财政政策用 implement，货币政策用 apply"], ["更加积极的财政政策", "a more proactive fiscal policy", "proactive 不是 active/positive"], ["适度宽松的货币政策", "an appropriately accommodative monetary policy", "accommodative 是官方用词，不是 loose/easy"], ["强化…协同", "improve coordination between...", "强化=improve"], ["改革举措与宏观政策", "reform measures and macro policies", ""], ["增强政策前瞻性针对性协同性", "make our policies more forward-looking, targeted, and coordinated", "三个\"性\"→三个形容词"]], "phrases": ["continue to implement — 继续实施（财政政策）", "continue to apply — 继续实施（货币政策）", "proactive fiscal policy — 积极的财政政策", "appropriately accommodative monetary policy — 适度宽松的货币政策", "improve coordination between... and... — 强化…与…协同", "forward-looking, targeted, and coordinated — 前瞻性、针对性、协同性"]}, {"type": "practice", "slot": "pm", "dir": "c2e", "mins": 30, "title": "汉译英练习：财政金融", "src": "贯彻落实党中央全面从严治党战略部署，严格落实中央八项规定精神，扎实开展党纪学习教育，大力整治形式主义、官僚主义，切实为基层减负，深入治理群众身边的不正之风，持续加强党风廉政建设和反腐败斗争。", "ref": "We implemented the Party Central Committee's strategic plans for conducting full and rigorous Party self-governance, strictly complied with the central Party leadership's eight-point decision on improving work conduct, and launched an initiative to increase awareness of Party discipline. We made a major push to address pointless formalities and bureaucratism so as to lighten the burdens on those working on the ground, intensified efforts to rectify misconduct directly affecting people's lives, and kept working to improve conduct, build integrity, and combat corruption.", "checks": ["\"全面从严治党\"是 full and rigorous Party self-governance？", "\"中央八项规定\"是 the central Party leadership's eight-point decision on improving work conduct？", "\"党纪学习教育\"是 an initiative to increase awareness of Party discipline？", "\"形式主义、官僚主义\"是 pointless formalities and bureaucratism？", "\"为基层减负\"是 lighten the burdens on those working on the ground？", "\"不正之风\"是 misconduct？", "\"党风廉政建设\"是 improve conduct, build integrity？", "\"反腐败斗争\"是 combat corruption？"]}, {"type": "review", "slot": "pm", "mins": 30, "title": "滚动复习与术语本", "body": "快速过 Day 1-10 的词（约100个）。今天重点默写： appropriately accommodative monetary policy（适度宽松的货币政策） forward-looking, targeted, and coordinated（前瞻性、针对性、协同性） prevent and defuse risks in key areas（防范化解重点领域风险） stem the downturn and restore stability in the real estate market（止跌回稳） peaking carbon emissions and achieving carbon neutrality（碳达峰碳中和）"}, {"type": "comprehensive", "slot": "pm", "mins": 60, "title": "综合能力刷题", "body": "做一套词汇选择题 + 完形填空，限时40分钟。剩余20分钟对答案。"}]},
{"day": 12, "theme": "依法行政", "modules": [{"type": "vocab", "slot": "am", "mins": 30, "title": "背诵热词（12个）", "words": [{"zh": "中央八项规定", "en": "the central Party leadership's eight-point decision on improving work conduct", "hint": "官方全称"}, {"zh": "形式主义", "en": "pointless formalities", "hint": "pointless=无意义的"}, {"zh": "官僚主义", "en": "bureaucratism", "hint": ""}, {"zh": "为基层减负", "en": "lighten the burdens on those working on the ground", "hint": "ground=基层"}, {"zh": "不正之风", "en": "misconduct", "hint": ""}, {"zh": "党风廉政建设", "en": "improve conduct, build integrity", "hint": "拆成两个动作"}, {"zh": "行政执法监督", "en": "supervision over administrative law enforcement", "hint": "over 不是 of"}, {"zh": "涉企行政检查", "en": "administrative inspections on enterprises", "hint": "on enterprises"}, {"zh": "隐性债务", "en": "hidden debts", "hint": ""}, {"zh": "存款准备金率", "en": "required reserve ratios", "hint": "required=法定"}, {"zh": "信访工作法治化", "en": "put the handling of public complaints on a solid legal footing", "hint": "很长但高频"}, {"zh": "矛盾纠纷排查化解", "en": "identify and defuse conflicts and disputes", "hint": "identify=排查"}], "method": ""}, {"type": "reading", "slot": "am", "mins": 60, "title": "精读段落：依法行政", "src": "深入推进依法行政。提请全国人大常委会审议法律议案19件，制定修订行政法规28部。自觉依法接受监督。认真办理人大代表建议和政协委员提案。加强行政执法监督，规范涉企行政检查。", "ref": "We advanced law-based government administration. We submitted 19 legislative proposals to the Standing Committee of the NPC for deliberation and formulated or revised 28 administrative regulations. We readily accepted oversight in compliance with the law and handled with keen attention recommendations from NPC deputies and proposals by CPPCC National Committee members. We stepped up supervision over administrative law enforcement and regulated administrative inspections on enterprises.", "breakdown": [["深入推进依法行政", "advanced law-based government administration", "深入推进=advanced"], ["提请全国人大常委会审议", "submitted... to the Standing Committee of the NPC for deliberation", "提请=submitted；审议=deliberation"], ["法律议案19件", "19 legislative proposals", "议案=proposals"], ["制定修订行政法规28部", "formulated or revised 28 administrative regulations", ""], ["自觉依法接受监督", "readily accepted oversight in compliance with the law", "readily=自觉；oversight=监督"], ["认真办理", "handled with keen attention", "keen attention=认真"], ["人大代表建议", "recommendations from NPC deputies", "建议=recommendations"], ["政协委员提案", "proposals by CPPCC National Committee members", "提案=proposals"], ["加强行政执法监督", "stepped up supervision over administrative law enforcement", "stepped up=加强"], ["规范涉企行政检查", "regulated administrative inspections on enterprises", "规范=regulated"]], "phrases": ["advanced law-based government administration — 推进依法行政", "submitted... for deliberation — 提请…审议", "formulated or revised — 制定修订", "readily accepted oversight in compliance with the law — 自觉依法接受监督", "handled with keen attention — 认真办理", "NPC deputies — 人大代表", "CPPCC National Committee members — 政协委员", "stepped up supervision over — 加强…监督", "regulated administrative inspections on enterprises — 规范涉企行政检查"]}, {"type": "practice", "slot": "pm", "dir": "c2e", "mins": 30, "title": "汉译英练习：依法行政", "src": "一次性增加6万亿元地方专项债务限额置换存量隐性债务。稳妥推进地方中小金融机构改革化险。强化应急管理和安全生产，开展燃气、电动自行车等安全隐患全链条专项整治。有效防范应对洪涝、台风、地震等自然灾害。", "ref": "As a one-time policy step, we raised the ceiling for local government special-purpose bonds by six trillion yuan to replace existing hidden debts. We also prudently advanced reforms to defuse risks in local small and medium financial institutions. We improved emergency management and workplace safety and adopted whole-of-chain approaches to tackling safety hazards such as those related to gas and electric bikes. We took effective measures to guard against and respond to floods, typhoons, earthquakes, and other natural disasters.", "checks": ["\"一次性增加\"是 as a one-time policy step？", "\"专项债务限额\"是 the ceiling for special-purpose bonds？", "6万亿元换算对了吗？→ six trillion yuan", "\"置换存量隐性债务\"是 to replace existing hidden debts？", "\"稳妥推进\"是 prudently advanced？", "\"改革化险\"是 reforms to defuse risks？", "\"全链条专项整治\"是 whole-of-chain approaches to tackling？", "\"安全隐患\"是 safety hazards？", "\"有效防范应对\"是 took effective measures to guard against and respond to？"]}, {"type": "review", "slot": "pm", "mins": 30, "title": "滚动复习与术语本", "body": "快速过 Day 1-11 的词（约110个）。今天重点对比以下\"推进/加强\"类动词的不同译法： | **中文** | **英文** | **使用场景** | | --| --| --| | 深入推进 | advanced | 依法行政、改革 | | 加强 | stepped up / strengthened | 监督、管理 | | 稳妥推进 | prudently advanced | 有风险的改革 | | 扎实推进 | made solid progress in | 具体工作 | | 纵深推进 | intensified efforts to | 统一大市场 | | 大力推动 | made major efforts to | 创新驱动 |"}, {"type": "comprehensive", "slot": "pm", "mins": 60, "title": "综合能力刷题", "body": "做一套阅读理解（4篇），限时40分钟。剩余20分钟对答案。"}]},
{"day": 13, "theme": "大国外交", "modules": [{"type": "vocab", "slot": "am", "mins": 30, "title": "背诵热词（15个）", "words": [{"zh": "人类命运共同体", "en": "a community with a shared future for mankind", "hint": "官方固定表述"}, {"zh": "全球伙伴关系", "en": "global partnerships", "hint": ""}, {"zh": "多边主义", "en": "multilateralism", "hint": ""}, {"zh": "中国式现代化", "en": "Chinese modernization", "hint": "不加 model/style"}, {"zh": "全面建设社会主义现代化国家", "en": "building a modern socialist country in all respects", "hint": "in all respects=全面"}, {"zh": "党中央集中统一领导", "en": "centralized, unified leadership of the Party Central Committee", "hint": "两个形容词+逗号"}, {"zh": "\"十五五\"规划", "en": "the 15th Five-Year Plan", "hint": ""}, {"zh": "中国特色大国外交", "en": "major-country diplomacy with Chinese characteristics", "hint": "major-country 不是 big country"}, {"zh": "统筹发展和安全", "en": "ensuring both development and security", "hint": "both...and..."}, {"zh": "做优增量、盘活存量", "en": "optimizing new resources and making the best use of existing ones", "hint": ""}, {"zh": "因地制宜", "en": "in light of local conditions", "hint": ""}, {"zh": "稳就业、稳企业、稳市场、稳预期", "en": "keeping employment, enterprises, markets, and expectations stable", "hint": "stable 放最后"}, {"zh": "增强政策前瞻性针对性协同性", "en": "making policies more forward-looking, targeted, and coordinated", "hint": ""}, {"zh": "质的有效提升和量的合理增长", "en": "higher-quality growth with appropriate increase in output", "hint": ""}, {"zh": "良好开局", "en": "getting off to a good start", "hint": "习语"}], "method": "这组是第一阶段的\"收官词\"，很多是前面出现过的综合表达。建议全部默写一遍，检验14天的积累效果。"}, {"type": "reading", "slot": "am", "mins": 60, "title": "精读段落：大国外交", "src": "过去一年，中国特色大国外交开创新局面。推动构建人类命运共同体，巩固拓展全球伙伴关系，坚持真正的多边主义，在应对全球性挑战和解决国际地区热点问题中发挥积极建设性作用。中国为促进世界和平与发展作出了重要贡献。", "ref": "In 2024, we made new advances in conducting major-country diplomacy with Chinese characteristics. We continued to promote the building of a community with a shared future for mankind. We consolidated and expanded partnerships across the globe, stayed committed to true multilateralism, and played a positive and constructive role in addressing global challenges and resolving regional and international hotspot issues. With these efforts, China made important contributions to peace and development in the world.", "breakdown": [["开创新局面", "made new advances in", "不翻\"局面\""], ["推动构建", "continued to promote the building of", "推动=promote；构建=building"], ["巩固拓展", "consolidated and expanded", "两个动词并列"], ["全球伙伴关系", "partnerships across the globe", "across the globe 比 global 更有气势"], ["坚持真正的多边主义", "stayed committed to true multilateralism", "stayed committed to=坚持"], ["应对全球性挑战", "addressing global challenges", "addressing=应对"], ["解决国际地区热点问题", "resolving regional and international hotspot issues", "热点=hotspot"], ["积极建设性作用", "a positive and constructive role", "两个形容词"], ["作出重要贡献", "made important contributions to", ""]], "phrases": ["made new advances in conducting — 开创新局面", "continued to promote the building of — 推动构建", "consolidated and expanded partnerships across the globe — 巩固拓展全球伙伴关系", "stayed committed to true multilateralism — 坚持真正的多边主义", "played a positive and constructive role in — 发挥积极建设性作用", "addressing global challenges and resolving hotspot issues — 应对挑战和解决热点问题", "made important contributions to peace and development — 为和平与发展作出重要贡献"]}, {"type": "practice", "slot": "pm", "dir": "c2e", "mins": 30, "title": "汉译英练习：大国外交", "src": "推动外贸稳规模优结构。扩大双向投资合作。高质量共建\"一带一路\"。积极扩大自主开放。进一步扩大高水平对外开放。着力建设强大国内市场。深入实施提振消费专项行动。充分挖掘释放有效投资潜力。", "ref": "We will keep the volume of foreign trade stable and refine its mix. We will expand two-way investment cooperation. We will pursue high-quality Belt and Road cooperation. We will open wider to the outside world. We will further expand high-standard opening up. We will build a robust domestic market. We will continue to advance special initiatives to boost consumption. We will fully tap and unleash the potential of effective investment.", "checks": ["\"稳规模优结构\"是 keep the volume stable and refine its mix？", "\"双向投资合作\"是 two-way investment cooperation？", "\"高质量共建\"是 pursue high-quality... cooperation？", "\"自主开放\"是 open wider to the outside world？", "\"高水平对外开放\"是 high-standard opening up？", "\"强大国内市场\"是 a robust domestic market？", "\"提振消费专项行动\"是 special initiatives to boost consumption？", "\"挖掘释放有效投资潜力\"是 tap and unleash the potential of effective investment？"]}, {"type": "review", "slot": "pm", "mins": 30, "title": "滚动复习与术语本", "body": "快速过 Day 1-12 的词（约120个）。今天重点默写外交类长搭配： a community with a shared future for mankind（人类命运共同体） major-country diplomacy with Chinese characteristics（中国特色大国外交） centralized, unified leadership of the Party Central Committee（党中央集中统一领导） building a modern socialist country in all respects（全面建设社会主义现代化国家） stayed committed to true multilateralism（坚持真正的多边主义）"}, {"type": "comprehensive", "slot": "pm", "mins": 60, "title": "综合能力刷题", "body": "做一套词汇选择题 + 阅读理解（2篇），限时40分钟。剩余20分钟对答案。"}]},
{"day": 14, "theme": "成绩与挑战", "modules": [{"type": "vocab", "slot": "am", "mins": 20, "title": "背诵热词（10个）", "words": [{"zh": "上海合作组织", "en": "Shanghai Cooperation Organization", "hint": ""}, {"zh": "金砖国家", "en": "BRICS", "hint": ""}, {"zh": "亚太经合组织", "en": "APEC", "hint": ""}, {"zh": "二十国集团", "en": "G20", "hint": ""}, {"zh": "中非合作论坛", "en": "Forum on China-Africa Cooperation", "hint": "注意 on"}, {"zh": "和平共处五项原则", "en": "Five Principles of Peaceful Coexistence", "hint": "Coexistence 拼写"}, {"zh": "综合国力", "en": "composite national strength", "hint": "composite=综合"}, {"zh": "新时代新征程", "en": "the new journey in the new era", "hint": ""}, {"zh": "教育公平与质量提升", "en": "education equity and quality", "hint": "equity=公平"}, {"zh": "精神文化需求", "en": "intellectual and cultural needs", "hint": "intellectual=精神"}], "method": ""}, {"type": "reading", "slot": "am", "mins": 60, "title": "精读段落：成绩与挑战", "src": "回顾过去一年，成绩来之不易。外部环境变化带来的不利影响持续加深，国内长期积累的一些深层次结构性矛盾集中显现，内需不振、预期偏弱等问题交织叠加，局部地区洪涝等自然灾害频发，保持经济社会平稳运行的难度加大。面对多重困难挑战，我们加力实施存量政策，适时优化宏观调控，积极有效应对。", "ref": "Our achievements in 2024 did not come easily. The adverse impact of changes in the international environment increased, and some deep-seated structural problems that had been building up in the country for years came to a head. Sluggish domestic demand was compounded by weak public expectations along with other issues, and natural disasters like floods occurred frequently in some parts of China. All this added to the difficulty of maintaining economic and social stability. However, we responded to this array of difficulties and challenges with both active and effective steps: We redoubled efforts to implement adopted policies and improved macro regulation in a timely manner.", "breakdown": [["成绩来之不易", "did not come easily", "简洁有力"], ["外部环境变化带来的不利影响持续加深", "the adverse impact of changes in the international environment increased", "adverse=不利的"], ["深层次结构性矛盾", "deep-seated structural problems", "deep-seated=深层次"], ["集中显现", "came to a head", "习语：到了爆发点"], ["内需不振", "sluggish domestic demand", "sluggish=不振/疲软"], ["预期偏弱", "weak public expectations", ""], ["交织叠加", "compounded by", "compound=使…加重"], ["局部地区洪涝等自然灾害频发", "natural disasters like floods occurred frequently in some parts of China", ""], ["难度加大", "added to the difficulty of", ""], ["面对多重困难挑战", "this array of difficulties and challenges", "array=一系列"], ["加力实施存量政策", "redoubled efforts to implement adopted policies", "存量政策=adopted policies"], ["适时优化宏观调控", "improved macro regulation in a timely manner", "适时=in a timely manner"], ["积极有效应对", "with both active and effective steps", ""]], "phrases": ["did not come easily — 来之不易", "the adverse impact of — …带来的不利影响", "deep-seated structural problems — 深层次结构性矛盾", "came to a head — 集中显现/爆发", "sluggish domestic demand — 内需不振", "compounded by — 交织叠加/雪上加霜", "added to the difficulty of — 难度加大", "redoubled efforts to implement — 加力实施", "adopted policies — 存量政策", "in a timely manner — 适时"]}, {"type": "practice", "slot": "pm", "dir": "c2e", "mins": 30, "title": "汉译英练习：成绩与挑战", "src": "在这个过程中，我们深化了对经济工作的规律性认识，进一步认识到党中央集中统一领导是做好经济工作的根本保证，必须统筹好有效市场和有为政府、总供给和总需求、培育新动能和更新旧动能、做优增量和盘活存量、提升质量和做大总量的关系。实践再次表明，在以习近平同志为核心的党中央坚强领导下，全国上下聚力攻坚，我国发展没有闯不过的难关。", "ref": "In the course of this, we deepened our understanding of the laws governing economic work and became more keenly aware that the centralized, unified leadership of the Party Central Committee is essential to doing our economic work well. It is also clear that we must properly handle the relationships between an efficient market and a well-functioning government, between aggregate supply and demand, between fostering new growth drivers and upgrading old ones, between optimizing allocation of new resources and making the best use of existing ones, and between enhancing quality and expanding total output. What we have achieved once again proves that under the strong leadership of the CPC Central Committee with Comrade Xi Jinping at its core and with the dedicated efforts of our people across the country, we can prevail over any difficulty in pursuing development.", "checks": ["\"规律性认识\"是 the laws governing economic work？", "\"根本保证\"是 is essential to？", "\"有效市场和有为政府\"是 an efficient market and a well-functioning government？", "\"总供给和总需求\"是 aggregate supply and demand？", "\"培育新动能和更新旧动能\"是 fostering new growth drivers and upgrading old ones？", "\"做优增量和盘活存量\"是 optimizing allocation of new resources and making the best use of existing ones？", "\"提升质量和做大总量\"是 enhancing quality and expanding total output？", "\"没有闯不过的难关\"是 we can prevail over any difficulty？", "五组\"between...and...\"的并列结构写对了吗？"]}, {"type": "review", "slot": "pm", "mins": 30, "title": "滚动复习与术语本", "body": "这是第一阶段的最后一个复习时段。 快速过全部14天的210个热词，标出仍然不熟的词（目标：不超过20个），明天开始第二阶段时重点攻克。 分类快速检测（每类说出5个代表词） 经济类（能说出5个吗？） high-quality development / new quality productive forces / proactive fiscal policy / appropriately accommodative monetary policy / counter-cyclical adjustments 改革开放类（能说出5个吗？） unified national market / high-standard opening up / Belt and Road cooperation / negative list for cross-border trade in services / all market entities 科技创新类（能说出5个吗？） innovation-driven development / breakthroughs in core technologies in key fields / first-class innovators / Digital China Initiative / advanced manufacturing clusters 民生社会类（能说出5个吗？） high-quality full employment / people lifted out of poverty / rural migrant workers / all-around rural revitalization / basic old-age insurance 绿色发展类（能说出5个吗？） peaking carbon emissions and achieving carbon neutrality / energy consumption per unit of GDP / renewable energy / fine particulate matter / green transition across the board 治理安全类（能说出5个吗？） full and rigorous Party self-governance / law-based government administration / prevent and defuse risks in key areas / forward-looking, targeted, and coordinated / workplace safety 外交综合类（能说出5个吗？） a community with a shared future for mankind / major-country diplomacy with Chinese characteristics / true multilateralism / Chinese
