function vocabExport(words){
  return words.map(w=>[w.zh,w.en,w.hint||""].join("\t")).join("\n");
}
function copyText(text, msg){
  // 兜底：navigator.clipboard 不可用（file://、非安全上下文、部分内置浏览器）或写入被拒时走这里
  const legacy = ()=>{
    let ok=false;
    try{
      const ta=document.createElement("textarea");
      ta.value=text;
      ta.setAttribute("readonly","");            // iOS 上避免弹出键盘
      ta.style.cssText="position:fixed;top:0;left:0;width:1px;height:1px;opacity:0;";
      document.body.appendChild(ta);
      ta.focus(); ta.select();
      try{ ta.setSelectionRange(0, text.length); }catch(_){}  // iOS 需要显式设选区
      ok=document.execCommand("copy");
      ta.remove();
    }catch(_){ ok=false; }
    if(ok){ toast(msg); }
    else{ toast("自动复制失败，请在弹出框里长按/⌘C 手动复制"); try{ window.prompt("复制下面的文字：", text); }catch(_){} }
  };
  try{
    if(navigator.clipboard && navigator.clipboard.writeText){
      // 第二个参数即拒绝回调；.writeText 极少数实现下也可能同步抛错，故外层再包 try
      navigator.clipboard.writeText(text).then(()=>toast(msg), legacy);
    }else{
      legacy();
    }
  }catch(_){ legacy(); }
}

/* ── 完成状态 ── */
function isDone(id){ return (S.done||{})[id]; }
let fbOpen = null;
function openFb(mid){ fbOpen = mid; render(); }
function closeFb(){ fbOpen = null; render(); }
function saveFb(mid, title){
  const prob = ($("fbp_"+mid)||{}).value || "";
  const sugg = ($("fbs_"+mid)||{}).value || "";
  if(!prob.trim() && !sugg.trim()){ toast("两个框都空着，没什么要提交的"); return; }
  S.feedback = S.feedback || [];
  const existing = S.feedback.find(f=>f.mid===mid);
  const rec = { mid, day:(S.plan?shownDay():0), title, problem:prob.trim(), suggestion:sugg.trim(), at:new Date().toISOString() };
  if(existing) Object.assign(existing, rec); else S.feedback.push(rec);
  save(); fbOpen = null; render(); toast("反馈已记录，结束时随同步码发给作者即可");
}
function fbCount(mid){ return (S.feedback||[]).some(f=>f.mid===mid) ? 1 : 0; }
function toggleDone(id){
  S.done = S.done||{};
  S.done[id] = !S.done[id];
  save(); render();
}

/* ── 计时器 ── */
let timers = {};
function toggleTimer(id, mins){
  const btn = $( "tm_"+id );
  if(timers[id]){ clearInterval(timers[id].h); delete timers[id]; btn.classList.remove("timing"); btn.innerHTML = "开始计时 · "+mins+"分钟"; return; }
  const end = Date.now() + mins*60000;
  timers[id] = { h:setInterval(()=>{
    const left = end - Date.now();
    if(left<=0){ clearInterval(timers[id].h); delete timers[id]; btn.classList.remove("timing"); btn.innerHTML="时间到，去对照参考译文"; toast("限时结束"); return; }
    const mm = String(Math.floor(left/60000)).padStart(2,"0");
    const ss = String(Math.floor(left%60000/1000)).padStart(2,"0");
    btn.innerHTML = `<span class="timerbig">${mm}:${ss}</span> 停止`;
  },500) };
  btn.classList.add("timing");
}

const GRAMBANK = {
  tense:{name:"时态一致", drills:[
    {q:"Last year, China's GDP increases by 5 percent.", fix:"Last year, China's GDP increased by 5 percent.", why:"有明确的过去时间状语 last year，必须用一般过去时。政经文本里“去年/过去一年”开头的句子最容易顺手写成现在时。"},
    {q:"The government has issued the action plan in March 2024.", fix:"The government issued the action plan in March 2024.", why:"句中出现具体过去时间点（in March 2024）时不能用现在完成时。现在完成时只用于不带具体时间、强调对现在影响的场景。"},
    {q:"By the end of 2027, the recycling volume will increase by 30 percent compared with 2023.", fix:"By the end of 2027, the recycling volume will have increased by 30 percent compared with 2023.", why:"by + 将来时间点表示“到某时为止完成”，主句用将来完成时 will have done。这是政报目标句（到2027年实现……）的标配结构。"}
  ]},
  agree:{name:"主谓一致", drills:[
    {q:"The number of urban jobs have increased steadily.", fix:"The number of urban jobs has increased steadily.", why:"主语是 the number（单数），不是 jobs。注意区分：a number of + 复数名词才接复数动词。"},
    {q:"The development of new industries and future-oriented technologies are accelerating.", fix:"The development of new industries and future-oriented technologies is accelerating.", why:"主语核心词是 development（单数），后面一长串 of 短语只是修饰。长主语句先找核心词再定动词，是汉译英防错的基本动作。"},
    {q:"There is many challenges ahead in pursuing high-quality development.", fix:"There are many challenges ahead in pursuing high-quality development.", why:"there be 句型的动词跟真正的主语（challenges，复数）一致。写长句时开头的 there is 常常和后面的复数主语脱节。"}
  ]},
  article:{name:"冠词", drills:[
    {q:"China plays important role in global economy.", fix:"China plays an important role in the global economy.", why:"可数名词单数 role 前必须有冠词；global economy 是特指的“全球经济”要加 the。play a/an ... role in the ... 整体记为固定框架。"},
    {q:"The China's economy maintained steady growth.", fix:"China's economy maintained steady growth.", why:"专有名词所有格（China's）前不加 the。中文没有冠词系统，“中国（的）经济”直译时最容易多加或漏加。"},
    {q:"We should raise public awareness of protecting environment.", fix:"We should raise public awareness of protecting the environment.", why:"the environment（自然环境）是固定用法，特指人类共处的环境。类似的还有 the economy、the ocean。"}
  ]},
  clause:{name:"从句与连接", drills:[
    {q:"The economy grew steadily, employment remained stable.", fix:"The economy grew steadily, and employment remained stable. / The economy grew steadily while employment remained stable.", why:"两个完整句子不能只用逗号连接（逗号粘连是阅卷高频扣分点），必须加并列连词、改从句或用分号。汉译英尤其常犯，因为中文允许流水句。"},
    {q:"Because the stimulus policy is effective, so the market recovered quickly.", fix:"Because the stimulus policy is effective, the market recovered quickly.", why:"because 和 so 不能连用（同理 although 和 but）。中文“因为……所以……”成对出现，英文只能留一个。"},
    {q:"The measures which adopted last year proved effective.", fix:"The measures adopted last year proved effective. / The measures which were adopted last year proved effective.", why:"measures 和 adopt 是被动关系：要么用过去分词短语作后置定语，要么补全 which were。定语从句漏 be 动词是中式英语的典型症状。"}
  ]},
  chinglish:{name:"中式句式", drills:[
    {q:"We should accelerate to develop emerging industries.", fix:"We should accelerate the development of emerging industries.", why:"accelerate 是及物动词，直接接名词宾语，不接不定式。“加快发展X”的官方译法固定为 accelerate the development of X 或 move faster to develop X。"},
    {q:"The scale of foreign trade created a record high.", fix:"Foreign trade reached a record high.", why:"两个问题：范畴词 scale 是中文习惯（“外贸规模”），英文直接说 foreign trade 即可；“创新高”的搭配是 reach/hit a record high，不用 create。"},
    {q:"There are many people believe that green transition will create new jobs.", fix:"Many people believe that the green transition will create new jobs.", why:"there be 和 believe 两个谓语杂糅在一个句子里。要么 Many people believe...，要么 There are many people who believe...，不能省掉 who。"}
  ]}
};

let pendingRv = null;
function parseAiReview(){
  const raw = ($("rvcode").value||"");
  const m = raw.match(/COACHRV:\s*({[\s\S]*?})/);
  if(!m){ toast("没找到 COACHRV 结论码，请粘贴AI回复末尾那一行"); return; }
  let r; try{ r = JSON.parse(m[1]); }catch(e){ toast("结论码格式有误，让AI严格按格式重新输出末行"); return; }
  pendingRv = { tags:(r.tags||[]).filter(t=>TAGDEF[t]).slice(0,3), c2e:r.c2e, e2c:r.e2c, gramsub:(r.gramsub||[]).filter(s=>GRAMBANK[s]).slice(0,2), note:r.note||"" };
  render(); toast("已解析，请核对调整预览");
}
function renderRvPreview(){
  const r = pendingRv;
  const lines = [];
  r.tags.forEach(t=>lines.push(`【${TAGDEF[t]}】练习卡和精读卡将常驻提示：${TIPMAP[t]}`));
  if(r.tags.includes("gram")){
    const subs = (r.gramsub||[]).map(s=>GRAMBANK[s].name).join("、");
    lines.push(`【语法诊所】每日任务将插入15分钟改错训练${subs?("，专攻你的病灶："+subs):"，五类病灶轮换"}，持续到下次复盘。`);
  }
  lines.push(`汉译英：${r.c2e==="bad"?"标记为弱项——对应练习标红提醒加练，并建议每篇AI批改":"保持现状"}`);
  lines.push(`英译汉：${r.e2c==="bad"?"标记为弱项——对应练习标红提醒加练，并建议每篇AI批改":"保持现状"}`);
  if(r.note) lines.push(`AI核心建议（将显示在复盘结论中）：${r.note}`);
  return `<div class="panel" style="border-color:var(--red);border-width:1.5px"><h3 style="color:var(--red)">调整预览 · 待你确认</h3>
    ${lines.map(l=>`<p style="font-size:13.5px">· ${esc(l)}</p>`).join("")}
    <div class="btnrow" style="margin-top:10px"><button class="btn red" onclick="confirmRv()">确认，应用到计划</button><button class="btn" onclick="cancelRv()">放弃本次调整</button></div></div>`;
}
function confirmRv(){
  const r = pendingRv;
  S.focus = r.tags;
  S.gramsub = r.tags.includes("gram") ? (r.gramsub||[]) : [];
  S.weak = (S.weak||[]).filter(w=>!["c2e","e2c"].includes(w));
  if(r.c2e==="bad") S.weak.push("c2e");
  if(r.e2c==="bad") S.weak.push("e2c");
  const summary = `AI分析｜重点问题：${r.tags.map(t=>TAGDEF[t]).join("、")||"无明显模式"}。汉译英${r.c2e==="bad"?"标记为弱项加练":"保持"}，英译汉${r.e2c==="bad"?"标记为弱项加练":"保持"}。${r.note?("核心建议："+r.note):""}`;
  S.reviews = S.reviews||[];
  S.reviews.push({date:todayStr(), source:"ai", tags:r.tags, summary});
  S.lastReviewDay = currentDayN();
  pendingRv = null;
  save(); toast("计划已按AI分析调整"); switchView("today");
}
function cancelRv(){ pendingRv = null; render(); toast("已放弃本次调整"); }
const RQ = [

  {k:"c2e", q:"汉译英现在感觉？", opts:[["bad","很吃力"],["mid","一般"],["good","比较顺"]]},
  {k:"e2c", q:"英译汉现在感觉？", opts:[["bad","很吃力"],["mid","一般"],["good","比较顺"]]},

let rvSel = {};
function pickRv(btn){
  rvSel[btn.dataset.k] = btn.dataset.v;
  document.querySelectorAll(`.rv[data-k="${btn.dataset.k}"]`).forEach(b=>b.classList.remove("sel"));
  btn.classList.add("sel");

function submitReview(){
  if(Object.keys(rvSel).length < RQ.length){ toast("还有题没答"); return; }
  // 权重调整规则
  S.weak = S.weak.filter(w=>!["c2e","e2c","typing"].includes(w));
  if(rvSel.c2e==="bad") S.weak.push("c2e");
  if(rvSel.e2c==="bad") S.weak.push("e2c");
  if(rvSel.typing==="yes") S.weak.push("typing");
  if(TIPMAP[rvSel.err]) S.focus = [rvSel.err];
  S.gramsub = [];
  const errMap = {term:"术语积累（背词页每天加5个）",gram:"语法（每天精读多花10分钟拆句）",miss:"漏译（练习时先数原文信息点再翻）",tone:"翻译腔（对照参考译文朗读改写）",speed:"速度（严格执行限时，宁可粗糙先译完）"};
  const summary = `重点调整为：${errMap[rvSel.err]}。汉译英${rvSel.c2e==="bad"?"已标记为弱项加练":"保持"}，英译汉${rvSel.e2c==="bad"?"已标记为弱项加练":"保持"}${rvSel.typing==="yes"?"，每日插入打字练习":""}。`;
  S.reviews = S.reviews||[];
  S.reviews.push({date:todayStr(), source:"self", answers:{...rvSel}, summary});
  S.lastReviewDay = currentDayN();
  rvSel = {};
  save(); toast("计划已调整"); switchView("today");
}

        <button class="opt ob-pace" data-v="sprint60" onclick="obPick(this,'pace')">冲刺型 · 考前2个月发力</button>
      </div>
      <p class="hintline">冲刺型：冲刺开始前进入养成期，每天只花10–20分钟滚政经词条、保持阅读输入，考前集中上强度。剩余天数不足冲刺期时自动全程冲刺。</p></div>
    <button class="cta" id="obGo" disabled onclick="obSubmit()">生成我的计划</button>
    ${fbOpen==="__onboarding__" ? `<div class="fbpanel" style="margin-top:14px">
      <p class="note" style="margin-bottom:6px">对「诊断问卷」即时反馈（会随同步码发给作者）</p>
      <label class="fblabel">问题反馈</label>
      <textarea class="fbin" id="fbp___onboarding__" placeholder="哪个问题让你犹豫 / 选项不够用 / 看不懂？">${esc((( S.feedback||[]).find(f=>f.mid==="__onboarding__")||{}).problem||"")}</textarea>
      <label class="fblabel">改进建议</label>
      <textarea class="fbin" id="fbs___onboarding__" placeholder="你希望诊断怎么问？">${esc((( S.feedback||[]).find(f=>f.mid==="__onboarding__")||{}).suggestion||"")}</textarea>
      <div class="btnrow"><button class="btn primary" onclick="saveFb('__onboarding__','诊断问卷')">提交反馈</button><button class="btn" onclick="closeFb()">收起</button></div>
    </div>` : `<div class="btnrow" style="justify-content:center;margin-top:12px"><button class="fbbtn ${fbCount("__onboarding__")?"has":""}" onclick="openFb('__onboarding__')">${fbCount("__onboarding__")?"💬 已反馈":"💬 对这个页面反馈"}</button></div>`}
    ${qrBlock("onboard")}
  </div>`;
}
function bindOnboarding(){}
function obPick(btn, key){
  OB[key] = btn.dataset.v;
  document.querySelectorAll(".ob-"+key).forEach(b=>b.classList.remove("sel"));
  btn.classList.add("sel"); obCheck();
}
function obToggle(btn){
  const v = btn.dataset.v;
  const i = OB.weak.indexOf(v);
  if(i>=0){ OB.weak.splice(i,1); btn.classList.remove("sel"); }
  else { OB.weak.push(v); btn.classList.add("sel"); }
}
function obCheck(){
  $("obGo").disabled = !(OB.level && OB.examDate && OB.hours && OB.pace && daysBetween(todayStr(), OB.examDate) >= 7);
}
function obSubmit(){
  Object.assign(S, { level:OB.level, examDate:OB.examDate, hours:OB.hours, weak:[...OB.weak], pace:OB.pace, startDate:todayStr(), done:{}, work:{}, reviews:[] });
  buildPlan(); view="plan"; render();
  toast("计划已生成，点 Day 1 开始");
}

/* ── 启动 ── */
async function boot(){
  // 记录首次启动日期（试用计时起点），只写一次
  if(!S.firstUse){ S.firstUse = todayStr(); save(); }
  render();
}
boot();
</script>
</body>
</html>
