modernization / getting off to a good start"}, {"type": "comprehensive", "slot": "pm", "mins": 60, "title": "综合能力刷题", "body": "做一套完整的综合能力模拟（词汇 + 完形 + 阅读），限时60分钟。这是第一阶段的收官测试。"}]},
{"day": 15, "theme": "宏观政策·实战", "modules": [{"type": "vocab", "slot": "am", "mins": 20, "title": "背诵热词（8个）", "words": [{"zh": "一揽子增量政策", "en": "a package of new policies", "hint": ""}, {"zh": "存量政策", "en": "policies already in place / adopted policies", "hint": ""}, {"zh": "社会融资成本", "en": "overall financing costs", "hint": ""}, {"zh": "有效市场和有为政府", "en": "an efficient market and a well-functioning government", "hint": ""}, {"zh": "总供给和总需求", "en": "aggregate supply and demand", "hint": ""}, {"zh": "培育新动能和更新旧动能", "en": "fostering new growth drivers and upgrading old ones", "hint": ""}, {"zh": "对冲经济下行压力", "en": "cushion downward economic pressure", "hint": ""}, {"zh": "单边主义、保护主义", "en": "unilateralism and protectionism", "hint": ""}], "method": ""}, {"type": "practice", "slot": "am", "dir": "e2c", "mins": 50, "title": "英译汉练习：宏观政策·实战", "src": "Early in the year, we took all necessary steps to prepare for emerging complex and volatile situations. China's economy was thus well-placed to get off to a good start and build strong momentum in the first quarter. From the second quarter on, in response to new developments facing the economy, particularly the impact of US tariff hikes, we fully leveraged policies already in place and introduced a range of more robust measures to maintain employment and economic stability. These steps effectively cushioned downward economic pressure and ensured the fulfillment of major objectives for the year.\nWe pursued a more proactive fiscal policy and an appropriately accommodative monetary policy. Government spending was increased to strengthen fiscal support for key areas, while policy interest rates and required reserve ratios were cut to further reduce overall financing costs.", "ref": "年初我们就做好了应对复杂多变局面的充分准备，一季度经济起势有力、开局良好。二季度以后，针对经济运行中的新情况特别是美国加征关税冲击，充分发挥存量政策作用，加力推出稳就业稳经济等一系列新举措，有力对冲了经济下行压力，保障了全年主要目标实现。\n实施更加积极的财政政策和适度宽松的货币政策，扩大财政支出规模，加强重点领域财力保障，下调政策利率和存款准备金率，持续降低社会综合融资成本。", "checks": ["\"took all necessary steps to prepare\"有没有翻出\"充分准备\"？", "\"well-placed to get off to a good start\"翻成了\"开局良好\"？", "\"US tariff hikes\"翻成了\"美国加征关税\"？", "\"leveraged policies already in place\"翻成了\"发挥存量政策作用\"？", "\"cushioned downward economic pressure\"翻成了\"对冲经济下行压力\"？", "\"required reserve ratios\"翻成了\"存款准备金率\"？"]}, {"type": "practice", "slot": "pm", "dir": "c2e", "mins": 50, "title": "汉译英练习：宏观政策·实战", "src": "面对国内外形势深刻复杂的变化，以习近平同志为核心的党中央团结带领全国各族人民迎难而上、奋力拼搏，坚定不移贯彻新发展理念、推动高质量发展，统筹国内国际两个大局，全年经济社会发展主要目标任务顺利完成，\"十四五\"圆满收官，中国式现代化迈出新的坚实步伐。", "ref": "Amidst profound and complex developments both at home and abroad, the Party Central Committee with Comrade Xi Jinping at its core rallied the Chinese people of all ethnic groups and led us in meeting challenges head-on and working hard with determination. Keeping in mind both domestic and international imperatives, we steadfastly applied the new development philosophy and pursued high-quality development. Thanks to these efforts, the main objectives and tasks for economic and social development in 2025 were accomplished, the 14th Five-Year Plan was brought to a successful conclusion, and solid new strides were made in advancing Chinese modernization.", "checks": ["\"迎难而上、奋力拼搏\"是 meeting challenges head-on and working hard with determination？", "\"统筹国内国际两个大局\"是 keeping in mind both domestic and international imperatives？", "\"坚定不移贯彻\"是 steadfastly applied？", "\"圆满收官\"是 was brought to a successful conclusion？", "\"迈出新的坚实步伐\"是 solid new strides were made in advancing？"]}, {"type": "review", "slot": "pm", "mins": 15, "title": "今日批改重点", "body": "今天的核心翻译难点：；迎难而上 → meeting challenges head-on（不是 facing difficulties）；奋力拼搏 → working hard with determination；统筹两个大局 → keeping in mind both...imperatives；圆满收官 → was brought to a successful conclusion；对冲下行压力 → cushion downward pressure（不是 offset）；充分发挥存量政策作用 → fully leveraged policies already in place"}]},
{"day": 16, "theme": "消费以旧换新", "modules": [{"type": "vocab", "slot": "am", "mins": 20, "title": "背诵热词（8个）", "words": [{"zh": "消费品以旧换新", "en": "consumer goods trade-in programs", "hint": ""}, {"zh": "加力扩围实施", "en": "ramped up and extended to more items", "hint": ""}, {"zh": "服务消费潜力加快释放", "en": "consumption potential was unlocked at an accelerated pace", "hint": ""}, {"zh": "社会消费品零售总额", "en": "total retail sales of consumer goods", "hint": ""}, {"zh": "设备购置投资", "en": "investment in equipment purchases", "hint": ""}, {"zh": "新型政策性金融工具", "en": "new types of policy-backed financial instruments", "hint": ""}, {"zh": "补充重点项目资本金", "en": "replenish capital for major projects", "hint": ""}, {"zh": "\"内卷式\"竞争", "en": "rat race competition", "hint": ""}], "method": ""}, {"type": "practice", "slot": "am", "dir": "e2c", "mins": 50, "title": "英译汉练习：消费以旧换新", "src": "Consumer goods trade-in programs were ramped up and extended to more items, resulting in over 2.6 trillion yuan in commodity sales. Consumption potential was unlocked at an accelerated pace in culture, tourism, sports, and other service sectors, with total retail sales of consumer goods topping 50 trillion yuan. To boost effective investment, we stepped up efforts to implement major national strategies and enhance security capacity in key areas. Funding for equipment upgrades was allocated and put to use more quickly, driving an 11.8-percent increase in investment in equipment purchases. New types of policy-backed financial instruments were introduced to replenish capital for major projects.", "ref": "加力扩围实施消费品以旧换新，带动商品销售额超过2.6万亿元，文旅体等服务消费潜力加快释放，社会消费品零售总额突破50万亿元。围绕扩大有效投资，加强\"两重\"项目建设，加快设备更新资金拨付使用，设备购置投资增长11.8%，设立新型政策性金融工具补充重点项目资本金。", "checks": ["\"ramped up and extended to more items\"翻成了\"加力扩围实施\"？", "\"topping 50 trillion yuan\"翻成了\"突破50万亿元\"？", "\"allocated and put to use more quickly\"翻成了\"加快拨付使用\"？", "\"replenish capital\"翻成了\"补充资本金\"？", "数字换算对了吗？2.6 trillion = 2.6万亿"]}, {"type": "practice", "slot": "pm", "dir": "c2e", "mins": 50, "title": "汉译英练习：消费以旧换新", "src": "一年来，我国经济顶压前行、展现强大韧性。经济运行总体平稳、稳中有进，国内生产总值增长5%，总量达到140.19万亿元。就业总体稳定，城镇新增就业1267万人，城镇调查失业率平均为5.2%。对外贸易较快增长，出口多元化成效明显，国际收支基本平衡。民生保障更加有力，居民收入增长和经济增长同步，脱贫攻坚成果巩固拓展。", "ref": "Over the past year, the Chinese economy has proved remarkably resilient, forging ahead against headwinds. The economy remained generally stable, and steady growth was registered. Gross domestic product (GDP) grew by 5 percent, reaching 140.19 trillion yuan. Overall employment remained stable, with 12.67 million urban jobs created, and the average surveyed urban unemployment rate stood at 5.2 percent. Foreign trade registered rapid growth, significant advances were made in export diversification, and a basic equilibrium was maintained in the balance of payments. Public wellbeing initiatives delivered more robust outcomes: Personal incomes rose in step with economic growth; poverty alleviation gains were consolidated and expanded.", "checks": ["\"顶压前行\"是 forging ahead against headwinds？", "\"总量达到\"是 reaching X trillion yuan？", "\"城镇新增就业1267万人\"换算对了吗？→ 12.67 million", "\"出口多元化成效明显\"是 significant advances were made in export diversification？", "\"民生保障更加有力\"是 public wellbeing initiatives delivered more robust outcomes？", "\"居民收入增长和经济增长同步\"是 personal incomes rose in step with economic growth？"]}, {"type": "review", "slot": "pm", "mins": 15, "title": "今日批改重点", "body": "顶压前行 → forging ahead against headwinds；出口多元化成效明显 → significant advances were made in export diversification；民生保障更加有力 → public wellbeing initiatives delivered more robust outcomes；收入增长和经济增长同步 → rose in step with economic growth；加力扩围实施 → ramped up and extended to more items；突破50万亿元 → topping 50 trillion yuan"}]},
{"day": 17, "theme": "新质生产力·实战", "modules": [{"type": "vocab", "slot": "am", "mins": 20, "title": "背诵热词（8个）", "words": [{"zh": "芯片自主研发", "en": "independent R&D of chips", "hint": ""}, {"zh": "电磁弹射型航母", "en": "aircraft carrier equipped with an electromagnetic catapult system", "hint": ""}, {"zh": "国产大模型引领全球开源生态", "en": "China-made large AI models spearheaded the global open-source AI ecosystem", "hint": ""}, {"zh": "工业机器人", "en": "industrial robots", "hint": ""}, {"zh": "电动汽车充电设施", "en": "electric vehicle charging facilities", "hint": ""}, {"zh": "研发经费投入强度", "en": "R&D spending as a percentage of GDP", "hint": ""}, {"zh": "科技创新和产业创新融合加快", "en": "the integration of technological and industrial innovation picked up pace", "hint": ""}, {"zh": "制造业数字化转型", "en": "digital transformation of manufacturing", "hint": ""}], "method": ""}, {"type": "practice", "slot": "am", "dir": "e2c", "mins": 50, "title": "英译汉练习：新质生产力·实战", "src": "New quality productive forces grew steadily, and numerous new advances were made in science and technology. China led the way in the research, development, and application of artificial intelligence (AI), biomedicine, robotics, and quantum technology. New breakthroughs were made in the independent research and development (R&D) of chips. The Tianwen-2 probe embarked on an interplanetary exploration mission; large-scale application of the BeiDou Navigation Satellite System was extended across various sectors; and China-made large AI models spearheaded the development of the global open-source AI ecosystem.\nThe industrial structure continued to improve. The value added of high-tech manufacturing and equipment manufacturing grew by 9.4 percent and 9.2 percent respectively, while the output of industrial robots and integrated circuits rose by 28 percent and 10.9 percent respectively. New-energy vehicle output exceeded 16 million units, and the number of electric vehicle charging facilities topped 20 million.", "ref": "新质生产力稳步发展，科技创新成果丰硕，人工智能、生物医药、机器人、量子科技等研发应用走在世界前列，芯片自主研发有了新突破，天问二号开启\"追星\"之旅，北斗规模应用全面拓展，国产大模型引领全球开源生态。\n产业结构持续优化，高技术制造业、装备制造业增加值分别增长9.4%、9.2%，工业机器人、集成电路产量分别增长28%、10.9%，新能源汽车年产量超过1600万辆，电动汽车充电设施突破2000万个。", "checks": ["\"led the way in\"翻成了\"走在世界前列\"？", "\"embarked on an interplanetary exploration mission\"翻成了\"开启'追星'之旅\"？（注意意译）", "\"spearheaded\"翻成了\"引领\"？", "\"respectively\"对应了\"分别\"？", "\"exceeded 16 million units\"翻成了\"超过1600万辆\"？", "\"topped 20 million\"翻成了\"突破2000万个\"？"]}, {"type": "practice", "slot": "pm", "dir": "c2e", "mins": 50, "title": "汉译英练习：新质生产力·实战", "src": "坚持创新驱动发展，建设现代化产业体系。全面推进科技强国建设战略部署，强化国家战略科技力量建设，完善区域科技创新体系，加强基础前沿领域体系化布局和关键核心技术攻关。全社会研发经费投入强度达到2.8%，技术合同成交额增长10.8%。科技创新和产业创新融合加快，传统产业转型升级不断深入，新兴产业、未来产业蓬勃发展，现代服务业保持快速发展势头。", "ref": "We pursued innovation-driven development and continued to build a modernized industrial system. We implemented strategic plans for comprehensively building China's strength in science and technology. This included boosting strategic science and technology capabilities, improving regional technological innovation systems, reinforcing systematic planning for basic and frontier areas, and making breakthroughs in core technologies in key fields. Last year, China's R&D spending reached 2.8 percent of GDP, and the value of technology contract transactions rose by 10.8 percent. The integration of technological and industrial innovation picked up pace; transformation and upgrading of traditional industries continued; emerging industries and industries of the future achieved impressive growth; and rapid development was sustained in modern services.", "checks": ["\"全面推进科技强国建设战略部署\"是 implemented strategic plans for comprehensively building China's strength in S&T？", "\"国家战略科技力量\"是 strategic science and technology capabilities？", "\"基础前沿领域体系化布局\"是 reinforcing systematic planning for basic and frontier areas？", "\"研发经费投入强度达到2.8%\"是 R&D spending reached 2.8 percent of GDP？", "\"蓬勃发展\"是 achieved impressive growth？", "\"保持快速发展势头\"是 rapid development was sustained in？"]}, {"type": "review", "slot": "pm", "mins": 15, "title": "今日批改重点", "body": "走在世界前列 → led the way in；规模应用全面拓展 → large-scale application was extended across various sectors；产业结构持续优化 → the industrial structure continued to improve；国家战略科技力量 → strategic science and technology capabilities；基础前沿领域体系化布局 → systematic planning for basic and frontier areas；蓬勃发展 → achieved impressive growth"}]},
{"day": 18, "theme": "统一大市场·实战", "modules": [{"type": "vocab", "slot": "am", "mins": 20, "title": "背诵热词（8个）", "words": [{"zh": "全国统一大市场建设指引", "en": "guidelines on developing a unified national market", "hint": ""}, {"zh": "新版市场准入负面清单", "en": "an updated negative list for market access", "hint": ""}, {"zh": "招标投标", "en": "public bidding", "hint": ""}, {"zh": "产能治理", "en": "production capacity regulation", "hint": ""}, {"zh": "\"内卷式\"竞争综合整治", "en": "addressing rat race competition through holistic measures", "hint": ""}, {"zh": "要素市场化配置", "en": "market-based allocation of production factors", "hint": ""}, {"zh": "清理拖欠企业账款", "en": "see that overdue payments owed to enterprises were settled", "hint": ""}, {"zh": "海南自由贸易港封关运作", "en": "island-wide special customs operations were launched in the Hainan Free Trade Port", "hint": ""}], "method": ""}, {"type": "practice", "slot": "am", "dir": "e2c", "mins": 50, "title": "英译汉练习：统一大市场·实战", "src": "We implemented the guidelines on developing a unified national market, issued an updated negative list for market access, and systematically addressed prominent problems in the areas of public bidding and investment attraction. We pushed ahead with production capacity regulation in key industries and achieved notable progress in addressing rat race competition through holistic measures. Comprehensive reform trials were carried out to promote market-based allocation of production factors. Initiatives to deepen and upgrade the reform of state-owned enterprises (SOEs) yielded positive results, and we rolled out measures to further boost private investment. We worked faster and redoubled efforts to see that overdue payments owed to enterprises were settled.", "ref": "实施全国统一大市场建设指引，出台新版市场准入负面清单，系统整治招标投标、招商引资领域突出问题，推进重点行业产能治理，综合整治\"内卷式\"竞争成效显现。开展要素市场化配置综合改革试点。国有企业改革深化提升行动取得积极成效，出台进一步促进民间投资发展的措施。加快加力清理拖欠企业账款。", "checks": ["\"guidelines on developing\"翻成了\"建设指引\"？", "\"updated negative list for market access\"翻成了\"新版市场准入负面清单\"？", "\"rat race competition\"翻成了\"内卷式竞争\"？", "\"market-based allocation of production factors\"翻成了\"要素市场化配置\"？", "\"overdue payments owed to enterprises\"翻成了\"拖欠企业账款\"？", "\"yielded positive results\"翻成了\"取得积极成效\"？"]}, {"type": "practice", "slot": "pm", "dir": "c2e", "mins": 50, "title": "汉译英练习：统一大市场·实战", "src": "有序推进自主开放、单边开放，稳步扩大单方面免签或全面互免签证。加大稳外贸力度，进出口量稳质升，出口增长6.1%。出台稳外资行动方案，新设外资企业数量增长19.1%。实施自由贸易试验区提升战略，海南自由贸易港启动全岛封关运作。扎实推进高质量共建\"一带一路\"，各领域务实合作水平不断提升。", "ref": "We took the initiative to open China wider and advanced unilateral opening up in a well-ordered way, steadily expanding both unilateral visa-free entry policies and comprehensive mutual visa exemptions. Greater efforts were made to maintain stable performance of foreign trade, ensuring both stable volume and higher quality. Exports for the year grew by 6.1 percent. Thanks to a new initiative launched to keep foreign investment stable, we saw a 19.1-percent increase in the number of newly-established foreign-funded enterprises. The strategy to upgrade pilot free trade zones was implemented, and island-wide special customs operations were launched in the Hainan Free Trade Port. Solid steps were taken to advance high-quality Belt and Road cooperation, further boosting practical cooperation in various fields.", "checks": ["\"有序推进自主开放、单边开放\"是 took the initiative to open China wider and advanced unilateral opening up in a well-ordered way？", "\"单方面免签或全面互免签证\"是 unilateral visa-free entry policies and comprehensive mutual visa exemptions？", "\"进出口量稳质升\"是 ensuring both stable volume and higher quality？", "\"新设外资企业数量增长19.1%\"是 a 19.1-percent increase in the number of newly-established foreign-funded enterprises？", "\"封关运作\"是 special customs operations were launched？", "\"务实合作\"是 practical cooperation？"]}, {"type": "review", "slot": "pm", "mins": 15, "title": "今日批改重点", "body": "内卷式竞争 → rat race competition；要素市场化配置 → market-based allocation of production factors；拖欠企业账款 → overdue payments owed to enterprises；量稳质升 → stable volume and higher quality；封关运作 → special customs operations；全面互免签证 → comprehensive mutual visa exemptions；新设外资企业 → newly-established foreign-funded enterprises"}]},
{"day": 19, "theme": "新型城镇化", "modules": [{"type": "vocab", "slot": "am", "mins": 20, "title": "背诵热词（8个）", "words": [{"zh": "常住人口城镇化率", "en": "the share of permanent urban residents in the total population", "hint": ""}, {"zh": "农业转移人口市民化", "en": "granting permanent urban residency to people moving to cities from rural areas", "hint": ""}, {"zh": "稳面积、提单产、抗灾害", "en": "keep total grain acreage stable, boost per-unit crop yields, and protect against disasters", "hint": ""}, {"zh": "脱贫人口务工就业规模", "en": "the number of employed people among those lifted out of poverty", "hint": ""}, {"zh": "区域联动发展", "en": "interconnected development among different regions", "hint": ""}, {"zh": "大规模职业技能提升培训", "en": "large-scale training programs to upgrade vocational skills", "hint": ""}, {"zh": "渐进式延迟法定退休年龄", "en": "gradually raise the statutory retirement age", "hint": ""}, {"zh": "个人养老金制度", "en": "private pension system", "hint": ""}], "method": ""}, {"type": "practice", "slot": "am", "dir": "e2c", "mins": 50, "title": "英译汉练习：新型城镇化", "src": "We moved forward with both new urbanization and all-around rural revitalization and promoted coordinated development between urban and rural areas and between different regions. In implementing the plans set out at last year's Central Urban Work Conference, we fostered modern metropolitan areas, bolstered urban planning, development, and governance, steadily advanced urban renewal, put into full effect policies on granting permanent urban residency to people moving to cities from rural areas, and piloted initiatives on new urbanization. As a result, the share of permanent urban residents in the total population rose to 67.9 percent.\nEfforts to keep total grain acreage stable, boost per-unit crop yields, and protect against disasters helped secure yet another bumper harvest. We took concrete steps to ensure that efforts to consolidate and expand poverty alleviation gains were well aligned with those to boost rural revitalization. The number of employed people among those lifted out of poverty remained at over 30 million.", "ref": "统筹推进新型城镇化和乡村全面振兴，促进城乡区域协调发展。贯彻中央城市工作会议部署，培育发展现代化都市圈，加强城市规划建设治理，持续实施城市更新，落实好农业转移人口市民化政策，开展新型城镇化试点，常住人口城镇化率达到67.9%。\n着力稳面积、提单产、抗灾害，再夺粮食丰收。扎实做好巩固拓展脱贫攻坚成果同乡村振兴有效衔接，脱贫人口务工就业规模稳定在3000万人以上。", "checks": ["\"fostered modern metropolitan areas\"翻成了\"培育发展现代化都市圈\"？", "\"bolstered urban planning, development, and governance\"翻成了\"加强城市规划建设治理\"？", "\"granting permanent urban residency to people moving to cities from rural areas\"翻成了\"农业转移人口市民化\"？", "\"bumper harvest\"翻成了\"粮食丰收\"？", "\"well aligned with\"翻成了\"有效衔接\"？", "\"remained at over 30 million\"翻成了\"稳定在3000万人以上\"？"]}, {"type": "practice", "slot": "pm", "dir": "c2e", "mins": 50, "title": "汉译英练习：新型城镇化", "src": "切实抓好民生保障，积极发展社会事业。出台稳就业支持政策，开展大规模职业技能提升培训行动，重点群体就业保持稳定。推进教育强国建设三年行动计划，推动高校学科专业调整，加强县域普通高中建设。实施医疗卫生强基工程。完善儿科和精神卫生服务体系，全国二三级公立综合医院儿科服务实现全覆盖。", "ref": "We ensured the people's wellbeing and actively developed social programs. We adopted new supportive policies to stabilize employment, carried out large-scale training programs to upgrade vocational skills, and ensured stable employment for key groups. We advanced the three-year action plan for boosting China's strength in education, moved ahead with adjustments to academic disciplines and majors in universities, and enhanced the development of county-level regular high schools. We implemented initiatives to strengthen community-level medical and health services. Pediatric and mental health services were improved, and pediatric services were extended to all Grade II and Grade III public general hospitals in the country.", "checks": ["\"大规模职业技能提升培训\"是 large-scale training programs to upgrade vocational skills？", "\"教育强国建设三年行动计划\"是 the three-year action plan for boosting China's strength in education？", "\"高校学科专业调整\"是 adjustments to academic disciplines and majors in universities？", "\"县域普通高中\"是 county-level regular high schools？", "\"医疗卫生强基工程\"是 initiatives to strengthen community-level medical and health services？", "\"儿科和精神卫生服务体系\"是 pediatric and mental health services？", "\"二三级公立综合医院\"是 Grade II and Grade III public general hospitals？"]}, {"type": "review", "slot": "pm", "mins": 15, "title": "今日批改重点", "body": "现代化都市圈 → modern metropolitan areas；农业转移人口市民化 → granting permanent urban residency to people moving to cities from rural areas；稳面积、提单产、抗灾害 → keep acreage stable, boost per-unit yields, protect against disasters；有效衔接 → well aligned with；学科专业调整 → adjustments to academic disciplines and majors；医疗卫生强基工程 → initiatives to strengthen community-level medical and health services；内卷式竞争 → rat race competition"}]},
{"day": 20, "theme": "延迟退休养老", "modules": [{"type": "vocab", "slot": "am", "mins": 20, "title": "背诵热词（8个）", "words": [{"zh": "渐进式延迟法定退休年龄改革", "en": "the reform to gradually raise the statutory retirement age", "hint": ""}, {"zh": "城乡居民基础养老金", "en": "basic old-age benefits for rural and non-working urban residents", "hint": ""}, {"zh": "个人养老金制度", "en": "private pension system", "hint": ""}, {"zh": "养老服务消费补贴试点", "en": "trials on elderly care service vouchers", "hint": ""}, {"zh": "社会救助扩围增效", "en": "more extensive and effective social assistance", "hint": ""}, {"zh": "重度残疾人托养照护", "en": "care and support for people with severe disabilities", "hint": ""}, {"zh": "困境儿童福利保障", "en": "welfare and protection for children in need", "hint": ""}, {"zh": "长期护理保险制度", "en": "long-term care insurance schemes", "hint": ""}], "method": ""}, {"type": "practice", "slot": "am", "dir": "e2c", "mins": 50, "title": "英译汉练习：延迟退休养老", "src": "The reform to gradually raise the statutory retirement age was advanced in a prudent manner. Minimum basic old-age benefits for rural and non-working urban residents were increased by 20 yuan per month. The private pension system was implemented nationwide, and trials on elderly care service vouchers were launched. We delivered more extensive and effective social assistance, strengthened care and support for people with severe disabilities, and improved welfare and protection for children in need. Subsidies for entitled groups were raised.\nCultural programs and industries were boosted. Domestic tourist trips increased by 16.2 percent and inbound tourist trips by 17.1 percent, illustrating the vitality of the tourism sector. We successfully hosted the 9th Asian Winter Games and the 15th National Games. We also witnessed a strong surge in recreational sports events and public fitness activities.", "ref": "渐进式延迟法定退休年龄改革稳妥实施。城乡居民基础养老金月最低标准提高20元，在全国实施个人养老金制度，开展养老服务消费补贴试点。持续推进社会救助扩围增效，加强重度残疾人托养照护，完善困境儿童福利保障措施。提高优抚标准。\n发展文化事业和文化产业，旅游业活力显现，国内出游人次增长16.2%，入境旅游人次增长17.1%。成功举办第九届亚洲冬季运动会、第十五届全国运动会，群众体育赛事和全民健身活动蓬勃开展。", "checks": ["\"advanced in a prudent manner\"翻成了\"稳妥实施\"？", "\"minimum basic old-age benefits\"翻成了\"基础养老金月最低标准\"？", "\"private pension system\"翻成了\"个人养老金制度\"？", "\"elderly care service vouchers\"翻成了\"养老服务消费补贴\"？", "\"more extensive and effective social assistance\"翻成了\"社会救助扩围增效\"？", "\"children in need\"翻成了\"困境儿童\"？", "\"recreational sports events and public fitness activities\"翻成了\"群众体育赛事和全民健身活动\"？"]}, {"type": "practice", "slot": "pm", "dir": "c2e", "mins": 50, "title": "汉译英练习：延迟退休养老", "src": "健全基本医保参保长效机制，优化医药集采措施，推出商业健康保险创新药目录，长期护理保险制度覆盖3亿人。渐进式延迟法定退休年龄改革稳妥实施。城乡居民基础养老金月最低标准提高20元，在全国实施个人养老金制度，开展养老服务消费补贴试点。持续推进社会救助扩围增效，加强重度残疾人托养照护，完善困境儿童福利保障措施。提高优抚标准。", "ref": "We improved the mechanism for encouraging long-term participation in the basic medical insurance scheme, refined centralized procurement of medicines and medical consumables, and issued a list of innovative drugs for commercial health insurance. Long-term care insurance schemes now cover 300 million people. The reform to gradually raise the statutory retirement age was advanced in a prudent manner. Minimum basic old-age benefits for rural and non-working urban residents were increased by 20 yuan per month. The private pension system was implemented nationwide, and trials on elderly care service vouchers were launched. We delivered more extensive and effective social assistance, strengthened care and support for people with severe disabilities, and improved welfare and protection for children in need. Subsidies for entitled groups were raised.", "checks": ["\"基本医保参保长效机制\"是 the mechanism for encouraging long-term participation in the basic medical insurance scheme？", "\"医药集采\"是 centralized procurement of medicines and medical consumables？", "\"商业健康保险创新药目录\"是 a list of innovative drugs for commercial health insurance？", "\"覆盖3亿人\"是 cover 300 million people？（3亿=300 million）", "\"稳妥实施\"是 advanced in a prudent manner？", "\"扩围增效\"是 more extensive and effective？", "\"托养照护\"是 care and support？"]}, {"type": "review", "slot": "pm", "mins": 15, "title": "今日批改重点", "body": "医药集采 → centralized procurement of medicines and medical consumables；参保长效机制 → mechanism for encouraging long-term participation；个人养老金制度 → private pension system；社会救助扩围增效 → more extensive and effective social assistance；困境儿童 → children in need；优抚标准 → subsidies for entitled groups；3亿人 → 300 million people"}]},
{"day": 21, "theme": "污染防治", "modules": [{"type": "vocab", "slot": "am", "mins": 20, "title": "背诵热词（8个）", "words": [{"zh": "大气污染防治提质增效", "en": "improve both the quality and efficacy of air pollution prevention and control", "hint": ""}, {"zh": "地表水水质优良断面比例", "en": "the share of surface water with a good quality rating", "hint": ""}, {"zh": "生物多样性保护重大工程", "en": "major biodiversity conservation programs", "hint": ""}, {"zh": "美丽中国先行区", "en": "pilot zones under the Beautiful China Initiative", "hint": ""}, {"zh": "\"沙戈荒\"新能源基地", "en": "new energy bases in desert areas, the Gobi, and other arid areas", "hint": ""}, {"zh": "新型储能装机规模", "en": "installed capacity of new-type energy storage", "hint": ""}, {"zh": "非化石能源消费占比", "en": "the share of non-fossil energy in total energy consumption", "hint": ""}, {"zh": "国家自主贡献目标", "en": "Nationally Determined Contributions", "hint": ""}], "method": ""}, {"type": "practice", "slot": "am", "dir": "e2c", "mins": 50, "title": "英译汉练习：污染防治", "src": "We took solid measures to improve both the quality and efficacy of air pollution prevention and control. In cities at and above the prefectural level, the average concentration of fine particulate matter (PM2.5) fell by 4.4 percent. Efforts to conserve major rivers and important lakes and reservoirs were intensified, and the share of surface water with a good quality rating reached 91.4 percent. With the implementation of major biodiversity conservation programs, the overall quality and stability of our ecosystems were further improved. Initiatives were launched to build pilot zones under the Beautiful China Initiative.\nThe green and low-carbon transition in key industries picked up pace. The first batch of new energy bases in desert areas, the Gobi, and other arid areas was generally completed and put into operation. The installed capacity of new-type energy storage exceeded 130 gigawatts, and the share of non-fossil energy in total energy consumption reached 21.7 percent. China announced its 2035 Nationally Determined Contributions to respond to climate change, demonstrating our commitment as a responsible major country.", "ref": "扎实开展大气污染防治提质增效行动，地级及以上城市细颗粒物（PM2.5）平均浓度下降4.4%。持续加强大江大河和重要湖库保护，地表水水质优良断面比例提高到91.4%。实施生物多样性保护重大工程，生态系统整体质量与稳定性进一步提升。启动实施美丽中国先行区建设。\n加快重点行业绿色低碳转型。第一批\"沙戈荒\"新能源基地项目基本建成投产，新型储能装机规模超过1.3亿千瓦，非化石能源消费占比达到21.7%。宣布应对气候变化2035年国家自主贡献目标，充分展现负责任大国担当。", "checks": ["\"improve both the quality and efficacy\"翻成了\"提质增效\"？", "\"major rivers and important lakes and reservoirs\"翻成了\"大江大河和重要湖库\"？", "\"the overall quality and stability of our ecosystems\"翻成了\"生态系统整体质量与稳定性\"？", "\"pilot zones under the Beautiful China Initiative\"翻成了\"美丽中国先行区\"？", "\"desert areas, the Gobi, and other arid areas\"翻成了\"沙戈荒\"？", "\"130 gigawatts\"换算对了吗？→ 1.3亿千瓦（1 GW = 100万千瓦）", "\"demonstrating our commitment as a responsible major country\"翻成了\"展现负责任大国担当\"？"]}, {"type": "practice", "slot": "pm", "dir": "c2e", "mins": 50, "title": "汉译英练习：污染防治", "src": "加快美丽中国建设，推动绿色低碳发展。扎实开展大气污染防治提质增效行动，地级及以上城市细颗粒物（PM2.5）平均浓度下降4.4%。持续加强大江大河和重要湖库保护，地表水水质优良断面比例提高到91.4%。实施生物多样性保护重大工程，生态系统整体质量与稳定性进一步提升。启动实施美丽中国先行区建设。加快重点行业绿色低碳转型。", "ref": "We worked faster to build a Beautiful China and advanced green and low-carbon development. We took solid measures to improve both the quality and efficacy of air pollution prevention and control. In cities at and above the prefectural level, the average concentration of fine particulate matter (PM2.5) fell by 4.4 percent. Efforts to conserve major rivers and important lakes and reservoirs were intensified, and the share of surface water with a good quality rating reached 91.4 percent. With the implementation of major biodiversity conservation programs, the overall quality and stability of our ecosystems were further improved. Initiatives were launched to build pilot zones under the Beautiful China Initiative. The green and low-carbon transition in key industries picked up pace.", "checks": ["\"大气污染防治提质增效\"是 improve both the quality and efficacy of air pollution prevention and control？", "\"大江大河和重要湖库\"是 major rivers and important lakes and reservoirs？", "\"水质优良断面比例提高到91.4%\"是 the share of surface water with a good quality rating reached 91.4 percent？", "\"生态系统整体质量与稳定性\"是 the overall quality and stability of our ecosystems？", "\"先行区\"是 pilot zones？", "\"加快…转型\"是 ...transition picked up pace？"]}, {"type": "review", "slot": "pm", "mins": 15, "title": "今日批改重点", "body": "提质增效 → improve both the quality and efficacy；大江大河和重要湖库 → major rivers and important lakes and reservoirs；水质优良断面比例 → the share of surface water with a good quality rating；美丽中国先行区 → pilot zones under the Beautiful China Initiative；沙戈荒 → desert areas, the Gobi, and other arid areas；负责任大国担当 → our commitment as a responsible major country；130 gigawatts → 1.3亿千瓦（注意换算）"}]},
{"day": 22, "theme": "作风建设·实战", "modules": [{"type": "vocab", "slot": "am", "mins": 20, "title": "背诵热词（8个）", "words": [{"zh": "深入贯彻中央八项规定精神学习教育", "en": "a study campaign for fully implementing the central Party leadership's eight-point decision on improving work conduct", "hint": ""}, {"zh": "规范涉企行政执法专项行动", "en": "a special initiative to regulate enterprise-related administrative law enforcement", "hint": ""}, {"zh": "\"高效办成一件事\"常态化推进机制", "en": "the mechanism for ensuring regular headway on key matters in the delivery of one-stop government services", "hint": ""}, {"zh": "城乡基层治理", "en": "urban and rural community governance", "hint": ""}, {"zh": "新就业群体", "en": "groups in new forms of employment", "hint": ""}, {"zh": "安全生产治本攻坚三年行动", "en": "the three-year drive to address the root causes of workplace accidents", "hint": ""}, {"zh": "平安中国建设", "en": "the Peaceful China Initiative", "hint": ""}, {"zh": "生产安全事故总起数下降8.7%", "en": "an 8.7-percent reduction in accidents at work", "hint": ""}], "method": ""}, {"type": "practice", "slot": "am", "dir": "e2c", "mins": 50, "title": "英译汉练习：作风建设·实战", "src": "We implemented the Party Central Committee's strategic plans for conducting full and rigorous Party self-governance, conducted a study campaign for fully implementing the central Party leadership's eight-point decision on improving work conduct, and strengthened efforts to improve Party conduct, build integrity, and combat corruption. We also made a major push to address pointless formalities to lighten the burden on those working on the ground.\nWe continued to build a law-based government. We submitted 13 legislative proposals to the Standing Committee of the National People's Congress (NPC) for deliberation and formulated or revised 30 administrative regulations. We readily accepted oversight in compliance with the law and handled with careful attention motions and recommendations from NPC deputies and proposals by CPPCC National Committee members. We launched a special initiative to regulate enterprise-related administrative law enforcement.\nWe continued the three-year drive to address the root causes of workplace accidents and ensure production safety, realizing an 8.7-percent reduction in accidents at work. Every effort was made to safeguard national security and social stability, and robust measures were taken to prevent and crack down on illegal and criminal activities of all types in accordance with the law. All this has led to further progress in advancing the Peaceful China Initiative.", "ref": "贯彻落实党中央全面从严治党战略部署，扎实开展深入贯彻中央八项规定精神学习教育，加强党风廉政建设和反腐败斗争，大力整治形式主义为基层减负。\n深入推进法治政府建设，提请全国人大常委会审议法律议案13件，制定修订行政法规30部。自觉依法接受监督。认真办理人大代表议案、建议和政协委员提案。开展规范涉企行政执法专项行动。\n持续推进安全生产治本攻坚三年行动，生产安全事故总起数下降8.7%。全力维护国家安全和社会稳定，积极预防、依法打击各类违法犯罪活动，平安中国建设取得新进展。", "checks": ["\"a study campaign for fully implementing\"翻成了\"扎实开展深入贯彻…学习教育\"？", "\"a major push to address pointless formalities\"翻成了\"大力整治形式主义\"？", "\"motions and recommendations from NPC deputies\"翻成了\"人大代表议案、建议\"？", "\"the three-year drive to address the root causes\"翻成了\"治本攻坚三年行动\"？", "\"crack down on illegal and criminal activities\"翻成了\"依法打击各类违法犯罪活动\"？", "\"the Peaceful China Initiative\"翻成了\"平安中国建设\"？"]}, {"type": "practice", "slot": "pm", "dir": "c2e", "mins": 50, "title": "汉译英练习：作风建设·实战", "src": "过去一年取得的成绩来之不易。我们面对的是多年少有的外部冲击挑战和国内两难多难问题交织叠加的复杂严峻形势。国际经贸环境急剧变化，单边主义、保护主义陡然升级，市场预期受到频繁扰动，对外贸易明显承压。国内经济深刻转型，深层次结构性矛盾问题持续显现，消费、投资增长动力不足。", "ref": "What we achieved in 2025 was indeed hard won. Rarely in many years have we encountered such a grave and complex landscape, where external shocks and challenges were intertwined with domestic difficulties and tough policy choices. The international economic and trade environment underwent drastic changes. As unilateralism and protectionism abruptly escalated, market expectations were hit by frequent volatility, and China's foreign trade came under considerable pressure. Domestically, the economy remained in the midst of a profound transformation, deep-seated structural problems became more pronounced, and consumption and investment lacked adequate growth momentum.", "checks": ["\"来之不易\"是 was indeed hard won？", "\"多年少有的\"是 rarely in many years have we encountered？", "\"交织叠加\"是 intertwined with？", "\"两难多难问题\"是 difficulties and tough policy choices？", "\"急剧变化\"是 underwent drastic changes？", "\"陡然升级\"是 abruptly escalated？", "\"频繁扰动\"是 hit by frequent volatility？", "\"明显承压\"是 came under considerable pressure？", "\"增长动力不足\"是 lacked adequate growth momentum？"]}, {"type": "review", "slot": "pm", "mins": 15, "title": "今日批改重点", "body": "多年少有的 → rarely in many years have we encountered；两难多难问题 → difficulties and tough policy choices；陡然升级 → abruptly escalated；频繁扰动 → hit by frequent volatility；明显承压 → came under considerable pressure；增长动力不足 → lacked adequate growth momentum；治本攻坚 → address the root causes；平安中国建设 → the Peaceful China Initiative"}]},
{"day": 23, "theme": "经贸斗争", "modules": [{"type": "vocab", "slot": "am", "mins": 20, "title": "背诵热词（8个）", "words": [{"zh": "沉着应对、勇毅前行", "en": "meeting challenges with composure and pressing ahead with fortitude", "hint": ""}, {"zh": "有理有力有效开展经贸斗争", "en": "took a reasoned, robust, and effective approach to addressing economic and trade issues", "hint": ""}, {"zh": "政策\"组合拳\"", "en": "improved policy coordination", "hint": ""}, {"zh": "从最坏处打算，向最好处努力", "en": "preparing for the worst while striving for the best", "hint": ""}, {"zh": "稳住宏观经济大盘", "en": "maintained overall macroeconomic stability", "hint": ""}, {"zh": "提振全社会的士气和信心", "en": "bolstered morale and confidence across society", "hint": ""}, {"zh": "苦练内功", "en": "hone our own capabilities", "hint": ""}, {"zh": "投资于物和投资于人", "en": "invest in both physical assets and people", "hint": ""}], "method": ""}, {"type": "practice", "slot": "am", "dir": "e2c", "mins": 50, "title": "英译汉练习：经贸斗争", "src": "The Party Central Committee with Comrade Xi Jinping at its core led us in meeting these challenges with composure and pressing ahead with fortitude.\nOn the international front, we took a reasoned, robust, and effective approach to addressing economic and trade issues and stood firm in safeguarding China's national interests. Positive outcomes were produced by the five rounds of China-US trade talks, and important common understandings were reached by the two countries' heads of state during their meeting in Busan, putting China-US economic and trade cooperation on a more stable footing.\nOn the domestic front, we focused on running our own affairs well: We improved policy coordination and took macro policy steps to enhance counter-cyclical adjustments, with the aim of keeping employment, enterprise operations, markets, and expectations stable. By preparing for the worst while striving for the best, not only did we maintain overall macroeconomic stability and secure new advances in high-quality development, but we also significantly bolstered morale and confidence across society.", "ref": "以习近平同志为核心的党中央带领我们沉着应对、勇毅前行，对外有理有力有效开展经贸斗争，坚定维护我国利益，中美5轮经贸磋商取得积极成果，两国元首釜山会晤达成重要共识，为经贸合作注入更多稳定性；对内打好政策\"组合拳\"，加强宏观政策逆周期调节，着力稳就业、稳企业、稳市场、稳预期，集中力量办好自己的事。我们从最坏处打算，向最好处努力，不仅稳住了宏观经济大盘，推动高质量发展取得新成效，而且极大提振了全社会的士气和信心。", "checks": ["\"with composure and pressing ahead with fortitude\"翻成了\"沉着应对、勇毅前行\"？", "\"a reasoned, robust, and effective approach\"翻成了\"有理有力有效\"？", "\"stood firm in safeguarding\"翻成了\"坚定维护\"？", "\"on a more stable footing\"翻成了\"注入更多稳定性\"？", "\"running our own affairs well\"翻成了\"集中力量办好自己的事\"？", "\"bolstered morale and confidence across society\"翻成了\"提振全社会的士气和信心\"？"]}, {"type": "practice", "slot": "pm", "dir": "c2e", "mins": 50, "title": "汉译英练习：经贸斗争", "src": "在这个过程中，我们进一步认识到，做好新形势下经济工作必须充分挖掘经济潜能、必须坚持政策支持和改革创新并举、必须做到既\"放得活\"又\"管得好\"、必须坚持投资于物和投资于人紧密结合、必须以苦练内功来应对外部挑战。实践再次证明，坚持党中央集中统一领导是应对一切困难、做好各项工作的根本保证，中国人民有信心有智慧有力量战胜一切艰难险阻！", "ref": "During this process, we deepened our understanding of what is needed to deliver in economic work under new circumstances: We must fully tap the potential of the economy; both provide policy support and pursue reform and innovation; both foster market vitality and conduct effective regulation; invest in both physical assets and people; and hone our own capabilities to navigate external challenges. Once again, it has been shown that upholding the centralized, unified leadership of the Party Central Committee is the fundamental guarantee for overcoming all difficulties and advancing all of our work. It has been shown that the Chinese people possess the confidence, wisdom, and strength to surmount any obstacle that lies ahead.", "checks": ["\"充分挖掘经济潜能\"是 fully tap the potential of the economy？", "\"政策支持和改革创新并举\"是 both provide policy support and pursue reform and innovation？", "\"放得活\"是 foster market vitality？", "\"管得好\"是 conduct effective regulation？", "\"投资于物和投资于人\"是 invest in both physical assets and people？", "\"苦练内功\"是 hone our own capabilities？", "\"应对外部挑战\"是 navigate external challenges？", "\"根本保证\"是 the fundamental guarantee for？", "\"有信心有智慧有力量\"是 possess the confidence, wisdom, and strength？", "\"战胜一切艰难险阻\"是 surmount any obstacle？"]}, {"type": "review", "slot": "pm", "mins": 15, "title": "今日批改重点", "body": "沉着应对、勇毅前行 → with composure and pressing ahead with fortitude；有理有力有效 → reasoned, robust, and effective；办好自己的事 → running our own affairs well；放得活、管得好 → foster market vitality / conduct effective regulation；苦练内功 → hone our own capabilities；投资于物和投资于人 → invest in both physical assets and people；战胜一切艰难险阻 → surmount any obstacle that lies ahead"}]},
{"day": 24, "theme": "多边外交·实战", "modules": [{"type": "vocab", "slot": "am", "mins": 20, "title": "背诵热词（8个）", "words": [{"zh": "坚决反对保护主义和单边霸凌行径", "en": "remained firm in opposing protectionism and unilateral bullying acts", "hint": ""}, {"zh": "捍卫二战胜利成果", "en": "defending the victorious outcomes of World War II", "hint": ""}, {"zh": "全球治理倡议", "en": "Global Governance Initiative", "hint": ""}, {"zh": "中国－中亚峰会", "en": "China-Central Asia Summit", "hint": ""}, {"zh": "上海合作组织天津峰会", "en": "Shanghai Cooperation Organization Tianjin Summit", "hint": ""}, {"zh": "全球妇女峰会", "en": "Global Leaders' Meeting on Women", "hint": ""}, {"zh": "中拉论坛", "en": "China-CELAC Forum", "hint": ""}, {"zh": "\"十四五\"圆满收官", "en": "the 14th Five-Year Plan was brought to a successful conclusion", "hint": ""}], "method": ""}, {"type": "practice", "slot": "am", "dir": "e2c", "mins": 50, "title": "英译汉练习：多边外交·实战", "src": "In 2025, we made new advances in conducting major-country diplomacy with Chinese characteristics. President Xi Jinping and other Party and state leaders visited many countries and attended a host of major bilateral and multilateral events, including the China-Central Asia Summit, the 32nd APEC Economic Leaders' Meeting, the Virtual BRICS Summit, and the 20th G20 Summit. China also hosted several major diplomatic events, such as the Shanghai Cooperation Organization Tianjin Summit, the Global Leaders' Meeting on Women, and the Fourth Ministerial Meeting of the China-CELAC Forum.\nWe remained firm in opposing protectionism and unilateral bullying acts, in upholding multilateralism, openness, and cooperation, and in defending the victorious outcomes of World War II. We proposed the Global Governance Initiative, continued to promote the building of a community with a shared future for humanity, and played a positive and constructive role in addressing global challenges and resolving regional and international hotspot issues. With these efforts, China made important contributions to global peace and development.", "ref": "过去一年，中国特色大国外交取得新成效。习近平主席等党和国家领导人出访多国，出席中国－中亚峰会、亚太经合组织领导人非正式会议、金砖国家领导人线上峰会、二十国集团领导人峰会等重大多双边活动。成功举办上海合作组织天津峰会、全球妇女峰会、中拉论坛第四届部长级会议等重大主场外交活动。\n坚决反对保护主义和单边霸凌行径，坚定维护多边主义和开放合作，坚定捍卫二战胜利成果，提出全球治理倡议，推动构建人类命运共同体，在应对全球性挑战和解决国际地区热点问题中发挥积极建设性作用。中国为促进世界和平与发展作出了重要贡献。", "checks": ["\"a host of major bilateral and multilateral events\"翻成了\"重大多双边活动\"？", "\"the Virtual BRICS Summit\"翻成了\"金砖国家领导人线上峰会\"？", "\"unilateral bullying acts\"翻成了\"单边霸凌行径\"？", "\"defending the victorious outcomes of World War II\"翻成了\"捍卫二战胜利成果\"？", "\"Global Governance Initiative\"翻成了\"全球治理倡议\"？", "\"a community with a shared future for humanity\"翻成了\"人类命运共同体\"？"]}, {"type": "practice", "slot": "pm", "dir": "c2e", "mins": 50, "title": "汉译英练习：多边外交·实战", "src": "2025年是很不平凡的一年。党的二十届四中全会胜利召开，擘画了未来五年我国发展的宏伟蓝图。面对国内外形势深刻复杂的变化，以习近平同志为核心的党中央团结带领全国各族人民迎难而上、奋力拼搏，坚定不移贯彻新发展理念、推动高质量发展，统筹国内国际两个大局，全年经济社会发展主要目标任务顺利完成，\"十四五\"圆满收官，中国式现代化迈出新的坚实步伐。", "ref": "The year 2025 stood out as truly remarkable. At its fourth plenary session, the 20th Central Committee of the Communist Party of China (CPC) set out an inspiring blueprint for China's development over the next five years. Amidst profound and complex developments both at home and abroad, the Party Central Committee with Comrade Xi Jinping at its core rallied the Chinese people of all ethnic groups and led us in meeting challenges head-on and working hard with determination. Keeping in mind both domestic and international imperatives, we steadfastly applied the new development philosophy and pursued high-quality development. Thanks to these efforts, the main objectives and tasks for economic and social development in 2025 were accomplished, the 14th Five-Year Plan was brought to a successful conclusion, and solid new strides were made in advancing Chinese modernization.", "checks": ["\"很不平凡的一年\"是 stood out as truly remarkable？", "\"擘画宏伟蓝图\"是 set out an inspiring blueprint？", "\"迎难而上、奋力拼搏\"是 meeting challenges head-on and working hard with determination？", "\"坚定不移贯彻\"是 steadfastly applied？", "\"统筹国内国际两个大局\"是 keeping in mind both domestic and international imperatives？", "\"圆满收官\"是 was brought to a successful conclusion？", "\"迈出新的坚实步伐\"是 solid new strides were made in advancing？"]}, {"type": "review", "slot": "pm", "mins": 15, "title": "今日批改重点", "body": "擘画宏伟蓝图 → set out an inspiring blueprint；单边霸凌行径 → unilateral bullying acts；捍卫二战胜利成果 → defending the victorious outcomes of World War II；全球治理倡议 → Global Governance Initiative（专有名词大写）；重大主场外交活动 → hosted several major diplomatic events；线上峰会 → Virtual Summit；圆满收官 → was brought to a successful conclusion"}]},
{"day": 25, "theme": "房地产稳市", "modules": [{"type": "vocab", "slot": "am", "mins": 20, "title": "背诵热词（8个）", "words": [{"zh": "持续用力稳楼市", "en": "continued to take effective steps to stabilize the real estate market", "hint": ""}, {"zh": "因城施策调减限制性措施", "en": "introduced city-specific policies to adjust and reduce property transaction restrictions", "hint": ""}, {"zh": "个人住房公积金贷款利率", "en": "interest rates on mortgages granted through individual housing provident funds", "hint": ""}, {"zh": "\"保交房\"任务全面完成", "en": "the task of ensuring timely delivery of housing projects was completed across the board", "hint": ""}, {"zh": "综合施策稳股市", "en": "coordinated measures taken to keep the stock market stable", "hint": ""}, {"zh": "资本市场回稳回暖", "en": "the capital market steadily rebounded", "hint": ""}, {"zh": "一揽子化债方案", "en": "a package of measures to address debt risks", "hint": ""}, {"zh": "融资平台", "en": "financing platforms", "hint": ""}], "method": ""}, {"type": "practice", "slot": "am", "dir": "e2c", "mins": 60, "title": "英译汉练习：房地产稳市", "src": "We continued to take effective steps to stabilize the real estate market. We kept the supply of land for new real estate projects at an appropriate level, introduced city-specific policies to adjust and reduce property transaction restrictions, and cut interest rates on mortgages granted through individual housing provident funds. The task of ensuring timely delivery of housing projects was completed across the board.\nThanks to coordinated measures taken to keep the stock market stable, the capital market steadily rebounded and transactions became brisk. We continued to implement a package of measures to address debt risks. As hidden local government debts were replaced in a well-ordered way and the number of financing platforms was further reduced, the structure of local government debts continued to improve. We also took well-coordinated steps to defuse risks in small and medium local financial institutions and to promote their transformation and development. As a result, the number of high-risk financial institutions fell considerably, and notable progress was secured in risk mitigation.", "ref": "持续用力稳楼市，合理控制新增房地产用地供应，因城施策调减限制性措施，下调个人住房公积金贷款利率，\"保交房\"任务全面完成。综合施策稳股市，资本市场回稳回暖、交易活跃。深入实施一揽子化债方案，有序置换地方政府存量隐性债务，持续压减融资平台数量，地方债务结构不断优化。一体推进地方中小金融机构风险处置和转型发展，高风险机构数量大幅下降，风险化解成效明显。", "checks": ["\"kept the supply of land... at an appropriate level\"翻成了\"合理控制新增房地产用地供应\"？", "\"city-specific policies\"翻成了\"因城施策\"？", "\"completed across the board\"翻成了\"全面完成\"？", "\"steadily rebounded and transactions became brisk\"翻成了\"回稳回暖、交易活跃\"？", "\"in a well-ordered way\"翻成了\"有序\"？", "\"fell considerably\"翻成了\"大幅下降\"？", "\"notable progress was secured in risk mitigation\"翻成了\"风险化解成效明显\"？"]}, {"type": "practice", "slot": "pm", "dir": "c2e", "mins": 60, "title": "汉译英练习：房地产稳市", "src": "年初我们就做好了应对复杂多变局面的充分准备，一季度经济起势有力、开局良好。二季度以后，针对经济运行中的新情况特别是美国加征关税冲击，充分发挥存量政策作用，加力推出稳就业稳经济等一系列新举措，有力对冲了经济下行压力，保障了全年主要目标实现。实施更加积极的财政政策和适度宽松的货币政策，扩大财政支出规模，加强重点领域财力保障，下调政策利率和存款准备金率，持续降低社会综合融资成本。", "ref": "Early in the year, we took all necessary steps to prepare for emerging complex and volatile situations. China's economy was thus well-placed to get off to a good start and build strong momentum in the first quarter. From the second quarter on, in response to new developments facing the economy, particularly the impact of US tariff hikes, we fully leveraged policies already in place and introduced a range of more robust measures to maintain employment and economic stability. These steps effectively cushioned downward economic pressure and ensured the fulfillment of major objectives for the year. We pursued a more proactive fiscal policy and an appropriately accommodative monetary policy. Government spending was increased to strengthen fiscal support for key areas, while policy interest rates and required reserve ratios were cut to further reduce overall financing costs.", "checks": ["\"充分准备\"是 took all necessary steps to prepare？", "\"起势有力、开局良好\"是 get off to a good start and build strong momentum？", "\"美国加征关税冲击\"是 the impact of US tariff hikes？", "\"充分发挥存量政策作用\"是 fully leveraged policies already in place？", "\"有力对冲\"是 effectively cushioned？", "\"保障了全年主要目标实现\"是 ensured the fulfillment of major objectives for the year？", "\"扩大财政支出规模\"是 government spending was increased？", "\"持续降低社会综合融资成本\"是 further reduce overall financing costs？"]}]},
{"day": 26, "theme": "AI+与标准", "modules": [{"type": "vocab", "slot": "am", "mins": 20, "title": "背诵热词（8个）", "words": [{"zh": "聚焦重点领域制定修订国家标准", "en": "national standards for key areas were formulated or revised", "hint": ""}, {"zh": "\"人工智能+\"行动", "en": "the AI Plus Initiative", "hint": ""}, {"zh": "新型智能终端", "en": "new intelligent terminals", "hint": ""}, {"zh": "数据要素潜力加快释放", "en": "the potential of data as a production factor was unlocked more quickly", "hint": ""}, {"zh": "数字经济核心产业增加值", "en": "the value added of core digital economy industries", "hint": ""}, {"zh": "学前一年免费教育", "en": "one year of free preschool education", "hint": ""}, {"zh": "育儿补贴制度", "en": "childcare subsidies", "hint": ""}, {"zh": "出口多元化", "en": "export diversification", "hint": ""}], "method": ""}, {"type": "practice", "slot": "am", "dir": "e2c", "mins": 60, "title": "英译汉练习：AI+与标准", "src": "We implemented strategic plans for comprehensively building China's strength in science and technology. This included boosting strategic science and technology capabilities, improving regional technological innovation systems, reinforcing systematic planning for basic and frontier areas, and making breakthroughs in core technologies in key fields. Last year, China's R&D spending reached 2.8 percent of GDP, and the value of technology contract transactions rose by 10.8 percent.\nThe integration of technological and industrial innovation picked up pace; transformation and upgrading of traditional industries continued; emerging industries and industries of the future achieved impressive growth; and rapid development was sustained in modern services. A total of 583 national standards for key areas were formulated or revised. We moved ahead with digital transformation of manufacturing and the AI Plus Initiative. AI industrial application gathered pace, and new intelligent terminals emerged continuously. The potential of data as a production factor was unlocked more quickly, and the value added of core digital economy industries exceeded 10.5 percent of GDP.", "ref": "全面推进科技强国建设战略部署，强化国家战略科技力量建设，完善区域科技创新体系，加强基础前沿领域体系化布局和关键核心技术攻关。全社会研发经费投入强度达到2.8%，技术合同成交额增长10.8%。\n科技创新和产业创新融合加快，传统产业转型升级不断深入，新兴产业、未来产业蓬勃发展，现代服务业保持快速发展势头。聚焦重点领域制定修订583项国家标准。持续推进制造业数字化转型和\"人工智能+\"行动，行业应用加快落地，新型智能终端不断涌现。数据要素潜力加快释放，数字经济核心产业增加值占国内生产总值的比重提高到10.5%以上。", "checks": ["\"boosting strategic science and technology capabilities\"翻成了\"强化国家战略科技力量建设\"？", "\"reinforcing systematic planning for basic and frontier areas\"翻成了\"加强基础前沿领域体系化布局\"？", "\"picked up pace\"翻成了\"加快\"？", "\"achieved impressive growth\"翻成了\"蓬勃发展\"？", "\"the AI Plus Initiative\"翻成了\"人工智能+行动\"？", "\"the potential of data as a production factor\"翻成了\"数据要素潜力\"？", "\"exceeded 10.5 percent of GDP\"翻成了\"占比提高到10.5%以上\"？"]}, {"type": "practice", "slot": "pm", "dir": "c2e", "mins": 60, "title": "汉译英练习：AI+与标准", "src": "一年来，我国经济顶压前行、展现强大韧性。经济运行总体平稳、稳中有进，国内生产总值增长5%，总量达到140.19万亿元。就业总体稳定，城镇新增就业1267万人，城镇调查失业率平均为5.2%。对外贸易较快增长，出口多元化成效明显，国际收支基本平衡。民生保障更加有力，居民收入增长和经济增长同步，脱贫攻坚成果巩固拓展，实施学前一年免费教育政策、惠及1400万儿童，全面实施育儿补贴制度、惠及3000多万婴幼儿。粮食产量达到1.43万亿斤。", "ref": "Over the past year, the Chinese economy has proved remarkably resilient, forging ahead against headwinds. The economy remained generally stable, and steady growth was registered. Gross domestic product (GDP) grew by 5 percent, reaching 140.19 trillion yuan. Overall employment remained stable, with 12.67 million urban jobs created, and the average surveyed urban unemployment rate stood at 5.2 percent. Foreign trade registered rapid growth, significant advances were made in export diversification, and a basic equilibrium was maintained in the balance of payments. Public wellbeing initiatives delivered more robust outcomes: Personal incomes rose in step with economic growth; poverty alleviation gains were consolidated and expanded; the policy of providing one year of free preschool education was implemented, benefiting 14 million children; and over 30 million children under three benefited from the childcare subsidies launched nationwide last year. Grain output rose to 715 million metric tons.", "checks": ["\"顶压前行、展现强大韧性\"是 proved remarkably resilient, forging ahead against headwinds？", "\"总量达到140.19万亿元\"是 reaching 140.19 trillion yuan？", "\"城镇新增就业1267万人\"换算对了吗？→ 12.67 million", "\"出口多元化成效明显\"是 significant advances were made in export diversification？", "\"民生保障更加有力\"是 public wellbeing initiatives delivered more robust outcomes？", "\"惠及1400万儿童\"是 benefiting 14 million children？（1400万=14 million）", "\"惠及3000多万婴幼儿\"是 over 30 million children under three？", "\"1.43万亿斤\"换算对了吗？→ 715 million metric tons（1万亿斤=500 million metric tons，1.43万亿斤≈715 million）"]}]},
{"day": 27, "theme": "市场准入·实战", "modules": [{"type": "vocab", "slot": "am", "mins": 20, "title": "背诵热词（8个）", "words": [{"zh": "新版市场准入负面清单", "en": "an updated negative list for market access", "hint": ""}, {"zh": "招标投标领域突出问题", "en": "prominent problems in the area of public bidding", "hint": ""}, {"zh": "产能治理", "en": "production capacity regulation", "hint": ""}, {"zh": "\"内卷式\"竞争", "en": "rat race competition", "hint": ""}, {"zh": "综合整治成效显现", "en": "achieved notable progress through holistic measures", "hint": ""}, {"zh": "要素市场化配置综合改革试点", "en": "comprehensive reform trials to promote market-based allocation of production factors", "hint": ""}, {"zh": "促进民间投资", "en": "boost private investment", "hint": ""}, {"zh": "清理拖欠企业账款", "en": "see that overdue payments owed to enterprises were settled", "hint": ""}], "method": ""}, {"type": "practice", "slot": "am", "dir": "e2c", "mins": 60, "title": "英译汉练习：市场准入·实战", "src": "We took the initiative to open China wider and advanced unilateral opening up in a well-ordered way, steadily expanding both unilateral visa-free entry policies and comprehensive mutual visa exemptions. Greater efforts were made to maintain stable performance of foreign trade, ensuring both stable volume and higher quality. Exports for the year grew by 6.1 percent. Thanks to a new initiative launched to keep foreign investment stable, we saw a 19.1-percent increase in the number of newly-established foreign-funded enterprises. The strategy to upgrade pilot free trade zones was implemented, and island-wide special customs operations were launched in the Hainan Free Trade Port. Solid steps were taken to advance high-quality Belt and Road cooperation, further boosting practical cooperation in various fields.", "ref": "有序推进自主开放、单边开放，稳步扩大单方面免签或全面互免签证。加大稳外贸力度，进出口量稳质升，出口增长6.1%。出台稳外资行动方案，新设外资企业数量增长19.1%。实施自由贸易试验区提升战略，海南自由贸易港启动全岛封关运作。扎实推进高质量共建\"一带一路\"，各领域务实合作水平不断提升。", "checks": ["\"took the initiative to open China wider\"翻成了\"推进自主开放\"？", "\"unilateral visa-free entry policies and comprehensive mutual visa exemptions\"翻成了\"单方面免签或全面互免签证\"？", "\"ensuring both stable volume and higher quality\"翻成了\"量稳质升\"？", "\"newly-established foreign-funded enterprises\"翻成了\"新设外资企业\"？", "\"island-wide special customs operations\"翻成了\"全岛封关运作\"？", "\"practical cooperation\"翻成了\"务实合作\"？"]}, {"type": "practice", "slot": "pm", "dir": "c2e", "mins": 60, "title": "汉译英练习：市场准入·实战", "src": "实施全国统一大市场建设指引，出台新版市场准入负面清单，系统整治招标投标、招商引资领域突出问题，推进重点行业产能治理，综合整治\"内卷式\"竞争成效显现。开展要素市场化配置综合改革试点。国有企业改革深化提升行动取得积极成效，出台进一步促进民间投资发展的措施。加快加力清理拖欠企业账款。", "ref": "We implemented the guidelines on developing a unified national market, issued an updated negative list for market access, and systematically addressed prominent problems in the areas of public bidding and investment attraction. We pushed ahead with production capacity regulation in key industries and achieved notable progress in addressing rat race competition through holistic measures. Comprehensive reform trials were carried out to promote market-based allocation of production factors. Initiatives to deepen and upgrade the reform of state-owned enterprises (SOEs) yielded positive results, and we rolled out measures to further boost private investment. We worked faster and redoubled efforts to see that overdue payments owed to enterprises were settled.", "checks": ["\"建设指引\"是 guidelines on developing？", "\"系统整治\"是 systematically addressed？", "\"产能治理\"是 production capacity regulation？", "\"内卷式竞争\"是 rat race competition？", "\"综合整治成效显现\"是 achieved notable progress through holistic measures？", "\"要素市场化配置\"是 market-based allocation of production factors？", "\"深化提升行动取得积极成效\"是 initiatives to deepen and upgrade... yielded positive results？", "\"加快加力清理\"是 worked faster and redoubled efforts to see that... were settled？"]}]},
{"day": 28, "theme": "城市与民生", "modules": [{"type": "vocab", "slot": "am", "mins": 20, "title": "背诵热词（8个）", "words": [{"zh": "中央城市工作会议", "en": "Central Urban Work Conference", "hint": ""}, {"zh": "现代化都市圈", "en": "modern metropolitan areas", "hint": ""}, {"zh": "城市规划建设治理", "en": "urban planning, development, and governance", "hint": ""}, {"zh": "农业转移人口市民化", "en": "granting permanent urban residency to people moving to cities from rural areas", "hint": ""}, {"zh": "再夺粮食丰收", "en": "secured yet another bumper harvest", "hint": ""}, {"zh": "巩固拓展脱贫攻坚成果同乡村振兴有效衔接", "en": "efforts to consolidate and expand poverty alleviation gains were well aligned with those to boost rural revitalization", "hint": ""}, {"zh": "大规模职业技能提升培训", "en": "large-scale training programs to upgrade vocational skills", "hint": ""}, {"zh": "县域普通高中", "en": "county-level regular high schools", "hint": ""}], "method": ""}, {"type": "practice", "slot": "am", "dir": "e2c", "mins": 60, "title": "英译汉练习：城市与民生", "src": "We ensured the people's wellbeing and actively developed social programs. We adopted new supportive policies to stabilize employment, carried out large-scale training programs to upgrade vocational skills, and ensured stable employment for key groups. We advanced the three-year action plan for boosting China's strength in education, moved ahead with adjustments to academic disciplines and majors in universities, and enhanced the development of county-level regular high schools.\nWe implemented initiatives to strengthen community-level medical and health services. Pediatric and mental health services were improved, and pediatric services were extended to all Grade II and Grade III public general hospitals in the country. We effectively prevented and controlled the spread of infectious diseases such as Chikungunya. We improved the mechanism for encouraging long-term participation in the basic medical insurance scheme, refined centralized procurement of medicines and medical consumables, and issued a list of innovative drugs for commercial health insurance. Long-term care insurance schemes now cover 300 million people.", "ref": "切实抓好民生保障，积极发展社会事业。出台稳就业支持政策，开展大规模职业技能提升培训行动，重点群体就业保持稳定。推进教育强国建设三年行动计划，推动高校学科专业调整，加强县域普通高中建设。\n实施医疗卫生强基工程。完善儿科和精神卫生服务体系，全国二三级公立综合医院儿科服务实现全覆盖。有效防控基孔肯雅热等传染病疫情。健全基本医保参保长效机制，优化医药集采措施，推出商业健康保险创新药目录，长期护理保险制度覆盖3亿人。", "checks": ["\"large-scale training programs to upgrade vocational skills\"翻成了\"大规模职业技能提升培训行动\"？", "\"the three-year action plan for boosting China's strength in education\"翻成了\"教育强国建设三年行动计划\"？", "\"adjustments to academic disciplines and majors\"翻成了\"高校学科专业调整\"？", "\"community-level medical and health services\"翻成了\"医疗卫生强基工程\"？", "\"Grade II and Grade III public general hospitals\"翻成了\"二三级公立综合医院\"？", "\"centralized procurement of medicines and medical consumables\"翻成了\"医药集采\"？", "\"300 million people\"翻成了\"3亿人\"？（300 million = 3亿）"]}, {"type": "practice", "slot": "pm", "dir": "c2e", "mins": 60, "title": "汉译英练习：城市与民生", "src": "统筹推进新型城镇化和乡村全面振兴，促进城乡区域协调发展。贯彻中央城市工作会议部署，培育发展现代化都市圈，加强城市规划建设治理，持续实施城市更新，落实好农业转移人口市民化政策，开展新型城镇化试点，常住人口城镇化率达到67.9%。着力稳面积、提单产、抗灾害，再夺粮食丰收。扎实做好巩固拓展脱贫攻坚成果同乡村振兴有效衔接，脱贫人口务工就业规模稳定在3000万人以上。加大区域战略实施力度，区域联动发展水平不断提升。", "ref": "We moved forward with both new urbanization and all-around rural revitalization and promoted coordinated development between urban and rural areas and between different regions. In implementing the plans set out at last year's Central Urban Work Conference, we fostered modern metropolitan areas, bolstered urban planning, development, and governance, steadily advanced urban renewal, put into full effect policies on granting permanent urban residency to people moving to cities from rural areas, and piloted initiatives on new urbanization. As a result, the share of permanent urban residents in the total population rose to 67.9 percent. Efforts to keep total grain acreage stable, boost per-unit crop yields, and protect against disasters helped secure yet another bumper harvest. We took concrete steps to ensure that efforts to consolidate and expand poverty alleviation gains were well aligned with those to boost rural revitalization. The number of employed people among those lifted out of poverty remained at over 30 million. We intensified implementation of regional strategies and enhanced interconnected development among different regions.", "checks": ["\"贯彻…部署\"是 in implementing the plans set out at？", "\"培育发展现代化都市圈\"是 fostered modern metropolitan areas？", "\"农业转移人口市民化\"是 granting permanent urban residency to people moving to cities from rural areas？", "\"常住人口城镇化率达到67.9%\"是 the share of permanent urban residents in the total population rose to 67.9 percent？", "\"稳面积、提单产、抗灾害\"是 keep acreage stable, boost per-unit yields, protect against disasters？", "\"再夺粮食丰收\"是 secured yet another bumper harvest？", "\"有效衔接\"是 well aligned with？", "\"3000万人以上\"是 over 30 million？（3000万=30 million）", "\"区域联动发展\"是 interconnected development among different regions？"]}]},
{"day": 29, "theme": "全真模拟", "modules": [{"type": "practice", "slot": "am", "dir": "e2c", "mins": 60, "title": "英译汉练习：全真模拟", "src": "The year 2025 stood out as truly remarkable. At its fourth plenary session, the 20th Central Committee of the Communist Party of China (CPC) set out an inspiring blueprint for China's development over the next five years. Amidst profound and complex developments both at home and abroad, the Party Central Committee with Comrade Xi Jinping at its core rallied the Chinese people of all ethnic groups and led us in meeting challenges head-on and working hard with determination. Keeping in mind both domestic and international imperatives, we steadfastly applied the new development philosophy and pursued high-quality development. Thanks to these efforts, the main objectives and tasks for economic and social development in 2025 were accomplished, the 14th Five-Year Plan was brought to a successful conclusion, and solid new strides were made in advancing Chinese modernization.\nOver the past year, the Chinese economy has proved remarkably resilient, forging ahead against headwinds. The economy remained generally stable, and steady growth was registered. Gross domestic product (GDP) grew by 5 percent, reaching 140.19 trillion yuan. Overall employment remained stable, with 12.67 million urban jobs created, and the average surveyed urban unemployment rate stood at 5.2 percent. Foreign trade registered rapid growth, significant advances were made in export diversification, and a basic equilibrium was maintained in the balance of payments. Public wellbeing initiatives delivered more robust outcomes: Personal incomes rose in step with economic growth; poverty alleviation gains were consolidated and expanded.\nWhat we achieved in 2025 was indeed hard won. Rarely in many years have we encountered such a grave and complex landscape, where external shocks and challenges were intertwined with domestic difficulties and tough policy choices. The international economic and trade environment underwent drastic changes. As unilateralism and protectionism abruptly escalated, market expectations were hit by frequent volatility, and China's foreign trade came under considerable pressure.", "ref": "2025年是很不平凡的一年。党的二十届四中全会胜利召开，擘画了未来五年我国发展的宏伟蓝图。面对国内外形势深刻复杂的变化，以习近平同志为核心的党中央团结带领全国各族人民迎难而上、奋力拼搏，坚定不移贯彻新发展理念、推动高质量发展，统筹国内国际两个大局，全年经济社会发展主要目标任务顺利完成，\"十四五\"圆满收官，中国式现代化迈出新的坚实步伐。\n一年来，我国经济顶压前行、展现强大韧性。经济运行总体平稳、稳中有进，国内生产总值增长5%，总量达到140.19万亿元。就业总体稳定，城镇新增就业1267万人，城镇调查失业率平均为5.2%。对外贸易较快增长，出口多元化成效明显，国际收支基本平衡。民生保障更加有力，居民收入增长和经济增长同步，脱贫攻坚成果巩固拓展。\n过去一年取得的成绩来之不易。我们面对的是多年少有的外部冲击挑战和国内两难多难问题交织叠加的复杂严峻形势。国际经贸环境急剧变化，单边主义、保护主义陡然升级，市场预期受到频繁扰动，对外贸易明显承压。", "checks": []}, {"type": "practice", "slot": "pm", "dir": "c2e", "mins": 60, "title": "汉译英练习：全真模拟", "src": "坚持创新驱动发展，建设现代化产业体系。全面推进科技强国建设战略部署，强化国家战略科技力量建设，完善区域科技创新体系，加强基础前沿领域体系化布局和关键核心技术攻关。全社会研发经费投入强度达到2.8%，技术合同成交额增长10.8%。科技创新和产业创新融合加快，传统产业转型升级不断深入，新兴产业、未来产业蓬勃发展，现代服务业保持快速发展势头。\n进一步深化改革开放，畅通国民经济循环。扎实落实党的二十届三中全会改革部署。实施全国统一大市场建设指引，出台新版市场准入负面清单，系统整治招标投标、招商引资领域突出问题，推进重点行业产能治理，综合整治\"内卷式\"竞争成效显现。开展要素市场化配置综合改革试点。国有企业改革深化提升行动取得积极成效，出台进一步促进民间投资发展的措施。加快加力清理拖欠企业账款。", "ref": "We pursued innovation-driven development and continued to build a modernized industrial system. We implemented strategic plans for comprehensively building China's strength in science and technology. This included boosting strategic science and technology capabilities, improving regional technological innovation systems, reinforcing systematic planning for basic and frontier areas, and making breakthroughs in core technologies in key fields. Last year, China's R&D spending reached 2.8 percent of GDP, and the value of technology contract transactions rose by 10.8 percent. The integration of technological and industrial innovation picked up pace; transformation and upgrading of traditional industries continued; emerging industries and industries of the future achieved impressive growth; and rapid development was sustained in modern services.\nWe further deepened reform and opening up and ensured smooth flows in the national economy. We took solid steps to implement the reform plans adopted\n第三阶段：模考 + 查漏（Day 30-35，6.21-6.26）\n每天安排：\n- 早上 8:00-9:30：做一套模拟（实务·英译汉 或 综合能力）\n- 晚上 19:30-21:00：做一套模拟（实务·汉译英）\n- 晚上 21:00-22:00：逐句批改 + 回顾高频错误\n核心原则：\n- 不再学新词，只巩固已有积累\n- 严格限时，模拟考场节奏\n- 每天批改后把错误归类，考前集中突破\n一、高频易错术语总表（按错误类型分类）\nA. 拼写/用词易错\n| **中文** | **✅**** 正确** | **❌**** 常见错误** |\n| --- | --- | --- |\n| 积极的财政政策 | proactive fiscal policy | active / positive |\n| 适度宽松的货币政策 | appropriately accommodative monetary policy | loose / easy |\n| 高水平对外开放 | high-standard opening up | high-level |\n| 宏观调控 | macro regulation | macro control |\n| 新发展格局 | new pattern of development | mode / model |\n| 新发展理念 | new development philosophy | concept / idea |\n| 各类经营主体 | all market entities | subjects |\n| 社会治理 | social governance | management |\n| 安全生产 | workplace safety | production safety |\n| 生态文明建设 | ecological conservation | ecological civilization construction |\n| 义务教育 | compulsory education | mandatory / obligatory |\n| 脱贫攻坚成果 | achievements in poverty alleviation | elimination |\nB. 介词/搭配易错\n| **中文** | **✅**** 正确搭配** | **❌**** 常见错误** |\n| --- | --- | --- |\n| 外资准入限制 | restrictions on foreign investment | of |\n| 行政执法监督 | supervision over administrative law enforcement | of |\n| 涉企行政检查 | inspections on enterprises | of / for |\n| 对全球经济增长的贡献率 | contribute to global economic growth | for |\n| 在…方面取得进展 | made progress in | on |\n| 提请审议 | submitted... for deliberation | to deliberation |\nC. 四字格翻译易错\n| **中文** | **✅**** 正确处理** | **❌**** 常见错误** |\n| --- | --- | --- |\n| 砥砺奋进、攻坚克难 | overcome difficulties and forge ahead | 逐字翻译 |\n| 迎难而上、奋力拼搏 | meeting challenges head-on and working hard with determination | facing difficulties |\n| 来之不易 | did not come easily | hard to come |\n| 内需不振 | sluggish domestic demand | domestic demand is not good |\n| 集中显现 | came to a head | appeared together |\n| 交织叠加 | compounded by | intertwined and overlapped |\n| 顶压前行 | forging ahead against headwinds | moving forward under pressure |\n| 向新向优 | innovation-driven and high-quality | toward new and better |\n| 蓬勃活力 | dynamic | vigorous vitality |\n| 巩固拓展 | consolidated and expanded | consolidated and developed |\nD. 数字/单位换算易错\n| **中文** | **✅**** 正确换算** | **❌**** 常见错误** |\n| --- | --- | --- |\n| 1256万人 | 12.56 million | 1256 万 |\n| 3.7亿千瓦 | 370 million kilowatts | 3.7 亿 |\n| 134.9万亿元 | 134.9 trillion yuan | 134.9 万亿 |\n| 6万亿元 | six trillion yuan | 60,000 亿 |\n| 1.4万亿斤 | 700 million metric tons | 直接写万亿斤 |\n| 增长5% | grew by 5 percent | 用 % 符号 |\n| 约/左右 | about / around | approximately（太正式） |\n| 以上 | more than / over | above |\n| 接近 | close to / nearly | near |\nE. 机构/专有名词易错\n| **中文** | **✅**** 正确全称** |\n| --- | --- |\n| 全国人大常委会 | the Standing Committee of the National People's Congress (NPC) |\n| 人大代表 | NPC deputies |\n| 政协委员 | CPPCC National Committee members |\n| 中央政治局 | the Political Bureau of the Central Committee |\n| 党的二十届三中全会 | the third plenary session of the 20th CPC Central Committee |\n| 国务院 | the State Council |\n| 中国翻译研究院 | China Academy of Translation |\n| 海南自由贸易港 | Hainan Free Trade Port |\n| 上海合作组织 | Shanghai Cooperation Organization |\n| 中非合作论坛 | Forum on China-Africa Cooperation |\n二、万能句式速查卡（考前反复看）\n表达\"取得进展/成效\"\n| **程度** | **句式** |\n| --- | --- |\n| 一般 | Progress was made in... |\n| 扎实 | Solid headway/progress was made in... |\n| 显著 | Impressive strides were made in... / Notable progress was secured in... |\n| 积极 | Positive results were achieved in... / Encouraging headway was made in... |\n| 新的 | New achievements/advances were made in... |\n表达\"增长/下降\"\n| **方向** | **句式** |\n| --- | --- |\n| 增长到 | rose to / climbed to / reached X |\n| 增长了 | grew by / increased by / rose by X percent |\n| 超过 | exceeded / surpassed / topped X |\n| 突破 | topped / exceeded / passed the X mark |\n| 下降了 | fell by / dropped by / declined by X percent |\n| 降幅超过 | dropped by more than X percent |\n| 接近 | close to / nearly X percent |\n| 创新高 | reached a record high |\n表达\"采取措施\"\n| **力度** | **句式** |\n| --- | --- |\n| 一般 | We adopted measures to... / Steps were taken to... |\n| 加强 | We stepped up efforts to... / We strengthened... |\n| 加大力度 | We redoubled efforts to... / Greater efforts were made to... |\n| 扎实推进 | We made solid progress in... / Solid steps were taken to... |\n| 积极稳妥 | We actively yet prudently... |\n| 有序推进 | We advanced... in a well-ordered way |\n表达\"目标/展望\"\n| **类型** | **句式** |\n| --- | --- |\n| 将要做 | We will... |\n| 目标是 | The target/goal is to... |\n| 争取 | while striving for better in practice |\n| 确保 | ensure that... / ensuring the fulfillment of... |\n| 为…打好基础 | lay a solid foundation for... |\n表达\"面对困难\"\n| **场景** | **句式** |\n| --- | --- |\n| 面对 | In the face of... / Amidst... |\n| 特征 | marked by... / characterized by... |\n| 困难叠加 | compounded by... / intertwined with... |\n| 难度加大 | added to the difficulty of... |\n| 克服困难 | prevail over any difficulty / surmount any obstacle |\n表达\"因果/结果\"\n| **逻辑** | **句式** |\n| --- | --- |\n| 导致 | This led to... / ...resulting in... |\n| 因此 | As a result... / Thanks to these efforts... |\n| 从而 | ...thus bringing about... / ...thereby... |\n| 确保了 | ...ensuring the fulfillment of... |\n三、政府报告常用动词对照表（考前速记）\n| **中文** | **首选英文** | **备选** |\n| --- | --- | --- |\n| 推进 | advance | promote, move forward with |\n| 推动 | promote | drive, push ahead with |\n| 加强 | strengthen | step up, enhance, bolster |\n| 深化 | deepen | further |\n| 完善 | improve | refine, put in place |\n| 扩大 | expand | broaden, widen, extend |\n| 落实 | implement | carry out, put into effect |\n| 出台 | adopt | introduce, roll out, issue |\n| 制定 | formulate | draw up, develop |\n| 修订 | revise | amend |\n| 健全 | improve | refine, put in place |\n| 统筹 | coordinate | balance, ensure both...and... |\n| 激发 | energize | unleash, unlock |\n| 培育 | foster | nurture, cultivate |\n| 巩固 | consolidate | strengthen |\n| 拓展 | expand | extend |\n| 规范 | regulate | standardize |\n| 防范 | guard against | prevent |\n| 化解 | defuse | resolve, mitigate |\n| 维护 | safeguard | uphold, protect |\n四、每日模考安排", "checks": []}]},

async function verifyKeyInput(){
  const el = $("keyInput");
  const key = (el ? el.value : "").trim();
  if(!key){ toast("请输入卡密"); return; }
  const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(key));
  const hex = [...new Uint8Array(buf)].map(b=>b.toString(16).padStart(2,"0")).join("");
  if(ACCESS_KEYS.includes(hex)){
    localStorage.setItem("coach_auth", hex);
    toast("解锁成功，欢迎正式版用户！");
    render();
  } else {
    toast("卡密无效，请核对后重试");
  }
}

/* ── 规则引擎：诊断参数 → 计划 ──
   计划 = 日历天数组，每天引用素材库某一天并按参数调整模块。
   规则（第一版，全部可调）：
   1. 阶段划分：基础 40% / 强化 45% / 模考 15%（不足14天则砍基础）
   2. 每日时长 <3h：砍综合刷题（综合弱者除外），复习压缩到15分钟
   3. 每日时长 ≥5h：练习模块标记"加练一遍"
   4. 弱项加权：汉译英/英译汉弱 → 对应练习标记重点并建议AI批改；
      打字慢 → 每天插入10分钟打字练习模块
   5. 级别：二笔限时 = 三笔限时 × 0.75（二笔实务3小时四篇，节奏更紧），
      且每周提示补一篇外刊英译汉（素材库v2）
   6. 每7天插入一个"周复盘"模块，复盘结果调整后续权重
──────────────────────────────── */
function buildPlan(){
  const total = Math.max(daysBetween(S.startDate, S.examDate), 7);
  // 冲刺型：考前 sprintPref 天进入冲刺，其余为养成期；均衡型：全程冲刺结构
  const sprintPref = S.pace==="sprint60" ? 60 : S.pace==="sprint90" ? 90 : total;
  const sprintLen = Math.min(sprintPref, total);
  const inc = total - sprintLen;
  const days = [];
  for(let i=0;i<inc;i++){
    // 养成期：同一批词条持续3天，靠间隔复习长牢
    days.push({ n:i+1, mode:"inc", lib:Math.floor(i/3)%LIBRARY.length, stub:false, weekly:false });
  }
  for(let j=0;j<sprintLen;j++){
    // 冲刺短于35天：均匀抽样素材；长于35天：先完整一轮，之后进入二轮复用
    const libIdx = sprintLen <= LIBRARY.length
      ? (sprintLen===1 ? LIBRARY.length-1 : Math.round(j*(LIBRARY.length-1)/(sprintLen-1)))
      : (j % LIBRARY.length);
    days.push({ n:inc+j+1, mode:"sprint", lib:libIdx, stub:j>=LIBRARY.length, weekly:(j+1)%3===0 });
  }
  const p1 = Math.round(sprintLen*0.4), p2 = Math.round(sprintLen*0.45);
  S.plan = { total, inc, phases:[
    {name:"打基础 · 积累术语", from:inc+1, to:inc+p1},
    {name:"强化 · 翻译实战", from:inc+p1+1, to:inc+p1+p2},
    {name:"模考 · 查漏", from:inc+p1+p2+1, to:total}
  ], days };
  save();
}

function currentDayN(){
  const n = daysBetween(S.startDate, todayStr()) + 1;
  return Math.min(Math.max(n,1), S.plan.total);
}

function adjustedMins(m){
  let mins = m.mins;
  if(m.type==="practice" && S.level==="er") mins = Math.round(mins*0.75);
  if(m.type==="review" && S.hours==="2") mins = 15;
  return mins;
}

function microModule(dayN, slot){
  // 强度：用户可调，默认按阶段。inc→level1为主，sprint→逐步到2/3
  const intensity = S.microLevel || 0; // 0=自动
  const auto = (S.plan && dayN > (S.plan.inc||0)) ? 2 : 1;
  const lvl = intensity || auto;
  const pick = (arr)=>{
    const pool = arr.filter(x=>x.level<=lvl);
    return pool[dayN % pool.length];
  };
  return { type:"micro", slot, mins:10, id:`d${dayN}micro`,
    title:"每日微翻译", c2e:pick(MICRO.c2e), e2c:pick(MICRO.e2c), lvl };
}
function modulesForDay(dayN){
  const d = S.plan.days[dayN-1];
  const lib = LIBRARY[d.lib];
  if(d.mode==="inc"){
    const vsrc = lib.modules.find(m=>m.type==="vocab");
    const mods = [{ type:"vocab", slot:"am", mins:10, id:`d${dayN}m0`,
      title:"政经词条 · 低强度滚动", words:vsrc.words,
      method:"养成期不求快：点下面按钮去背词页背这组，跟着它的间隔复习队列走，每天10分钟。同一批词连续出现3天，靠重复长牢。政经词条不在专八/GRE的日常词汇体系里，正因如此才要趁时间充裕慢慢养。" }];
    mods.push(microModule(dayN, "am"));
    const w = (dayN-1)%7;
    if(w===2){
      const r = lib.modules.find(m=>m.type==="reading");
      if(r) mods.push({...r, id:`d${dayN}m1`, mins:30, title:"每周精读 · "+r.title.replace(/^精读段落：/,"")});
    }
    if(w===5){
      const rl = READLIST[Math.floor((dayN-1)/7) % READLIST.length];
      mods.push({ type:"extensive", slot:"pm", mins:25, id:`d${dayN}m2`, title:"泛读日 · "+rl.topic, read:rl });
    }
    if((dayN)%7===0) mods.push({ type:"weekly", slot:"pm", mins:10, id:`d${dayN}weekly`, title:"复盘节点", body:"" });
    return { lib, mods, stub:false, mode:"inc" };
  }
  let mods = lib.modules.map((m,i)=>({...m, id:`d${dayN}m${i}`}));
  // 模考日/考前收心日：这些天只做模考或收心，不叠加日常微翻译、泛读、语法诊所等
  const isExamPhase = lib.modules.some(m=>m.type==="examprep") || (lib.modules[0]&&lib.modules[0].title==="模考日");
  if(isExamPhase) return { lib, mods, stub:d.stub, mode:"sprint" };
  mods.push(microModule(dayN, "pm"));
  if(S.hours==="2" && !S.weak.includes("zonghe")) mods = mods.filter(m=>m.type!=="comprehensive");
  if(S.weak.includes("typing")) mods.push({type:"typing", slot:"pm", mins:10, id:`d${dayN}typing`, title:"打字提速练习", body:"随便打开一个空文档（手机备忘录、电脑记事本都行），把今天精读的中文参考译文照着敲一遍，计时。实务是机考，中文录入速度直接影响能不能写完。目标：中文40字/分钟以上。记录今天的速度，复盘时填写。"});
  if((S.focus||[]).includes("gram")){
    const subs = (S.gramsub||[]).filter(s=>GRAMBANK[s]);
    const keys = subs.length ? subs : Object.keys(GRAMBANK);
    const pat = keys[dayN % keys.length];
    mods.push({type:"grammar", slot:"pm", mins:15, id:`d${dayN}grammar`, pat, title:"语法诊所 · "+GRAMBANK[pat].name});
  }
  if(d.weekly) mods.push({type:"weekly", slot:"pm", mins:15, id:`d${dayN}weekly`, title:"复盘节点", body:""});
  const sprintDay = dayN - (S.plan.inc||0);
  if(sprintDay>0 && sprintDay%7===0){
    const rl = READLIST[Math.floor(sprintDay/7-1) % READLIST.length];
    mods.push({ type:"extensive", slot:"pm", mins:25, id:`d${dayN}ext`, title:"每周泛读 · "+rl.topic, read:rl });
  }
  return { lib, mods, stub:d.stub, mode:"sprint" };
}
