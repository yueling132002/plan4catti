name: QR Reminder

on:
  schedule:
    # 每天北京时间 9 点 = UTC 1 点
    - cron: '0 1 * * *'
  push:
    branches: [main]
    paths: ['index.html']
  # 允许手动触发（测试用）
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  # Job 1: 定时检查 QR_IMG 是否过期，到期则创建/更新 Issue
  check-qr-age:
    if: github.event_name != 'push'
    runs-on: ubuntu-latest
    steps:
      - name: 检出仓库
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # 需要完整 git 历史来查 QR_IMG 最近修改时间

      - name: 检查 QR_IMG 是否需要更新提醒
        uses: actions/github-script@v7
        with:
          script: |
            const { execSync } = require('child_process');

            // 用 git pickaxe 找最近一次包含 "const QR_IMG" 字符串的提交
            let lastChangeTs;
            try {
              const out = execSync(
                'git log -1 --format="%at" -S "const QR_IMG" -- index.html',
                { encoding: 'utf-8' }
              ).trim();
              lastChangeTs = parseInt(out, 10);
              if (!lastChangeTs) throw new Error('empty timestamp');
            } catch (e) {
              console.log('未找到 QR_IMG 的提交记录，跳过。错误：', e.message);
              return;
            }

            const nowTs = Math.floor(Date.now() / 1000);
            const ageDays = Math.floor((nowTs - lastChangeTs) / 86400);
            console.log(`QR_IMG 最近修改于 ${ageDays} 天前`);

            // 微信群二维码有效期约 7 天，6 天起开始提醒
            if (ageDays < 6) {
              console.log('尚在有效期内，无需提醒');
              return;
            }

            // 检查是否已有打开的提醒 issue（按标题前缀去重）
            const titlePrefix = '🔔 QR_IMG 已';
            const newTitle = `${titlePrefix} ${ageDays} 天未更新`;

            const { data: openIssues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              per_page: 100
            });

            const existing = openIssues.find(i => i.title.startsWith(titlePrefix));

            const body = [
              `微信群二维码有效期约 **7 天**，距离上次修改已过去 **${ageDays}** 天。`,
              '',
              '请按以下步骤更新：',
              '1. 在微信里导出新的群二维码',
              '2. 用 [base64-image.de](https://www.base64-image.de/) 之类工具转成 base64',
              '3. 替换 `index.html` 里的 `const QR_IMG = "..."`',
              '4. `git commit` 并 `git push`',
              '',
              `检测时间：${new Date().toISOString()}`,
              '',
              '---',
              '*本提醒由 [qr-reminder workflow](.github/workflows/qr-reminder.yml) 自动发出*'
            ].join('\n');

            if (existing) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                title: newTitle,
                body: body
              });
              console.log(`已更新现有 issue #${existing.number}`);
            } else {
              const { data: issue } = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: newTitle,
                body: body,
                labels: ['reminder']
              });
              console.log(`已创建新 issue #${issue.number}`);
            }

  # Job 2: push 到 index.html 时精确检测 QR_IMG 是否真改了，
  # 改了才关闭提醒 issue；没改则不动
  close-on-update:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: 检出仓库
        uses: actions/checkout@v4
        with:
          fetch-depth: 2   # 只需 HEAD 和 HEAD~1 的 diff

      - name: 检测 QR_IMG 是否真改了，关闭对应 issue
        uses: actions/github-script@v7
        with:
          script: |
            const { execSync } = require('child_process');

            // 拿 HEAD 这次 commit 对 index.html 的 diff
            let qrChanged = false;
            try {
              const diff = execSync('git show HEAD -- index.html', { encoding: 'utf-8' });
              // 精确匹配：+/- 开头的、且声明 QR_IMG 的行（防止注释误判）
              qrChanged = /^[+-]\s*const QR_IMG\s*=/m.test(diff);
            } catch (e) {
              console.log('读取 diff 失败:', e.message);
              return;
            }

            if (!qrChanged) {
              console.log('本次 push 未修改 QR_IMG，无需关闭任何 issue');
              return;
            }

            console.log('本次 push 包含 QR_IMG 修改，关闭所有 🔔 QR_IMG 已* 的 open issue');

            const { data: openIssues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              per_page: 100
            });

            const toClose = openIssues.filter(i =>
              i.title.startsWith('🔔 QR_IMG 已')
            );

            if (toClose.length === 0) {
              console.log('没有需要关闭的 open issue');
              return;
            }

            for (const issue of toClose) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                state: 'closed',
                state_reason: 'completed'
              });
              console.log(`已关闭 issue #${issue.number}: ${issue.title}`);
            }